# ============================================================
#  画像生成ワークフロー（生成本体は PC のセルフホストランナーで動く）。
#
#  起動方法は2つ:
#   ① ハンズフリー（リモートのClaude推奨）: `imagegen-requests/request.txt` を
#      書いて push すると自動起動。Claudeはコミット権限だけで起動できる。
#   ② 手動: Actions画面の Run workflow / `gh workflow run`（workflow_dispatch）。
#
#  ★安全策: push トリガーは main の `imagegen-requests/request.txt` だけ。
#    fork からは main に push できないので、外部から実行されない
#    （pull_request トリガーは絶対に置かないこと）。
#  生成→縮小→（任意で透明化）→ icons/ や指定フォルダへ自動コミット＆プッシュ。
# ============================================================
name: 画像生成（PCのセルフホストランナー）

on:
  workflow_dispatch:
    inputs:
      kind:
        description: "種類（icon=メニューアイコン256px / coloring=ぬりえ線画900px / custom=任意の場所・サイズ）"
        type: choice
        options:
          - icon
          - coloring
          - custom
        default: icon
      prompts:
        description: "1行=「slug | プロンプト」。複数行OK。slugがファイル名になる（icons/<slug>.png 等）"
        type: string
        required: true
      dest:
        description: "kind=custom のときの保存先フォルダ（リポジトリ相対。例 games/maze/assets）"
        type: string
        required: false
        default: ""
      size:
        description: "kind=custom のときの最大ピクセル（長辺。既定 512）"
        type: string
        required: false
        default: "512"
      transparent:
        description: "白背景を透明に抜く（黒枠で囲まれた素材向け。icon/custom で有効。coloringは不可）"
        type: boolean
        required: false
        default: false
  push:
    branches: [main]
    paths:
      - "imagegen-requests/request.txt"   # ← この依頼ファイルを push したら自動起動

permissions:
  contents: write   # 生成画像を main にコミット＆プッシュするため

# 同時実行を1つに制限（genspark セッション＝単一の Chrome プロファイルのため）。
concurrency:
  group: image-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: [self-hosted, macOS]
    env:
      # PC 上の imagegen 実体（Chromeのログインセッション user-data/ と node_modules がある場所）。
      # ※launchd常駐は ~/Desktop（TCC保護）にアクセスできないため、Desktopの外に置く。
      IMAGEGEN_DIR: /Users/fc-yamaguchi/kids-imagegen
    steps:
      # コミット用のクリーンなチェックアウト（_work 配下）。ユーザーの作業ツリーには触らない。
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: パラメータ決定（push依頼ファイル or 手動入力）
        env:
          EVENT: ${{ github.event_name }}
          IN_KIND: ${{ inputs.kind }}
          IN_DEST: ${{ inputs.dest }}
          IN_SIZE: ${{ inputs.size }}
          IN_TRANS: ${{ inputs.transparent }}
          IN_PROMPTS: ${{ inputs.prompts }}
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          PF="$RUNNER_TEMP/prompts.txt"
          if [ "$EVENT" = "push" ]; then
            python3 "$GITHUB_WORKSPACE/.github/scripts/parse_request.py" \
              "$GITHUB_WORKSPACE/imagegen-requests/request.txt" "$PF" >> "$GITHUB_ENV"
          else
            printf '%s\n' "$IN_PROMPTS" > "$PF"
            {
              echo "KIND=${IN_KIND:-icon}"
              echo "DEST_IN=${IN_DEST:-}"
              echo "SIZE_IN=${IN_SIZE:-512}"
              echo "TRANSPARENT=${IN_TRANS:-false}"
            } >> "$GITHUB_ENV"
          fi
          echo "PROMPTS_FILE=$PF" >> "$GITHUB_ENV"
          echo "--- 受け取ったプロンプト ---"; cat "$PF"

      - name: プロンプトを追記して生成（PCの実Chromeで）
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"   # node/playwright を確実に拾う
          cd "$IMAGEGEN_DIR"
          # 受け取った各行を prompts.txt に追記（同一行は重複追記しない＝再生成したい時はプロンプトを少し変える）。
          # progress.json で生成済みはスキップされるので、新規ぶんだけ生成される。
          while IFS= read -r line; do
            case "$line" in ''|\#*) continue;; esac
            if ! grep -qxF "$line" prompts.txt; then
              printf '%s\n' "$line" >> prompts.txt
              echo "＋追記: $line"
            fi
          done < "$PROMPTS_FILE"
          node generate.js

      - name: 生成画像を縮小して配置
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"   # python3(Pillow) を拾う
          # kind ごとに 保存先(DEST) と 縮小サイズ(SZ) を決める
          if [ "$KIND" = "coloring" ]; then
            DEST="games/coloring/lines"; SZ=900
          elif [ "$KIND" = "custom" ]; then
            DEST="$DEST_IN"; SZ="${SIZE_IN:-512}"
            case "$DEST" in
              ""|/*|*..*) echo "✗ dest が不正です: '$DEST'（リポジトリ相対・.. なし で指定）"; exit 1;;
            esac
          else
            DEST="icons"; SZ=256
          fi
          echo "DEST=$DEST" >> "$GITHUB_ENV"   # コミット段で再利用
          mkdir -p "$DEST"
          while IFS= read -r line; do
            case "$line" in ''|\#*) continue;; esac
            slug=$(printf '%s' "$line" | sed -E 's/ *\|.*//' | tr -d '[:space:]')
            [ -z "$slug" ] && continue
            src=$(ls -1 "$IMAGEGEN_DIR"/images/*_"$slug".png 2>/dev/null | sort | tail -1 || true)
            if [ -n "${src:-}" ]; then
              sips -Z "$SZ" "$src" --out "$DEST/$slug.png" >/dev/null
              if [ "$TRANSPARENT" = "true" ]; then
                python3 "$GITHUB_WORKSPACE/.github/scripts/transify.py" "$DEST/$slug.png" "$DEST/$slug.png" 60
              fi
              echo "✓ $DEST/$slug.png ← $(basename "$src")"
            else
              echo "⚠ 生成物が見つからない: $slug（生成に失敗した可能性）"
            fi
          done < "$PROMPTS_FILE"

      - name: コミット＆プッシュ
        run: |
          set -euo pipefail
          # 前ステップで $GITHUB_ENV に書いた DEST を使う
          git add "$DEST"
          if git diff --cached --quiet; then
            echo "コミットする変更なし（生成に失敗 or 既存と同一）"; exit 0
          fi
          git -c user.name="haruharu20190701" \
              -c user.email="y_peace24@icloud.com" \
              commit -m "画像生成($KIND): セルフホストランナーで生成 [run #${{ github.run_number }}]

          Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>"
          # actions/checkout が設定した認証情報（GITHUB_TOKEN）でそのまま push できる。
          # この push は images だけで request.txt を変えないので再トリガーしない（GITHUB_TOKEN push は元々workflowを再起動しない）。
          git push origin HEAD:main
