<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#fff3c4" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-180.png" />
<meta name="apple-mobile-web-app-title" content="こどもあそびば" />
<title>こどもあそびば｜5さいむけ むりょうの ブラウザゲーム</title>
<meta name="description" content="5さいくらいの こども向けの、むりょうで あそべる ブラウザゲームしゅう。ダウンロードふよう・とうろくふよう。スマホやタブレットで すぐに あそべます。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/" />
<!-- OGP（SNSシェアじの みため用）-->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="こどもあそびば｜5さいむけ むりょうの ブラウザゲーム" />
<meta property="og:description" content="5さいくらいの こども向けの、むりょうで あそべる ブラウザゲームしゅう。ダウンロードふよう・とうろくふよう。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />
<meta property="og:locale" content="ja_JP" />
<meta name="twitter:card" content="summary" />
<style>
  /* ── こどもあそびば：ゲームをえらぶ メニューがめん ── */
  :root{
    --bg1:#fff7d6; --bg2:#ffe1b8;
    --ink:#5b4636; --card:#fffdf5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%,var(--bg1),var(--bg2));
    color:var(--ink);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 40px;
  }
  h1{font-size:30px;font-weight:900;letter-spacing:1px;margin:6px 0 4px;text-align:center;}
  .sub{font-size:15px;color:#8a7a66;margin-bottom:22px;}
  /* ── ゲームのカード ── */
  #grid{
    display:grid;gap:16px;width:100%;max-width:560px;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  }
  .card{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    text-decoration:none;color:var(--ink);
    background:var(--card);border-radius:20px;padding:22px 14px;
    box-shadow:0 6px 0 #e8c98a, 0 12px 20px rgba(0,0,0,.10);
    transition:transform .1s, box-shadow .1s;
    aspect-ratio:1/1;
  }
  .card:active{transform:translateY(4px);box-shadow:0 2px 0 #e8c98a, 0 6px 12px rgba(0,0,0,.10);}
  .card .emoji{font-size:54px;line-height:1;}
  .card .name{font-size:19px;font-weight:800;text-align:center;}
  /* ── まだ ないゲーム（じゅんびちゅう）── */
  .card.soon{opacity:.55;box-shadow:0 6px 0 #ddd0b0;pointer-events:none;}
  .card.soon .badge{font-size:12px;font-weight:800;color:#a99;background:#fff;border-radius:999px;padding:2px 10px;}
  footer{margin-top:28px;font-size:12px;color:#a99;}
</style>
</head>
<body>
  <h1>🎈 こどもあそびば</h1>
  <div class="sub">すきな あそびを えらんでね</div>
  <div id="grid"></div>
  <footer>つくった あそび：<span id="count">0</span></footer>

<script>
/* =========================================================
   ゲームいちらん。あたらしいゲームは ここに 1ぎょう ふやすだけ。
   path … games/<なまえ>/index.html
   soon … true にすると「じゅんびちゅう」ひょうじ（クリックふか）
   ========================================================= */
const GAMES = [
  { name:"ぱずるぶろっく", emoji:"🧩", path:"games/puzzle-block/index.html" },
  { name:"ぴあの", emoji:"🎹", path:"games/piano/index.html" },
  { name:"おえかき", emoji:"🎨", path:"games/draw/index.html" },
  { name:"しんけいすいじゃく", emoji:"🃏", path:"games/memory/index.html" },
  { name:"かずあそび", emoji:"🔢", path:"games/numbers/index.html" },
  // れい: { name:"じゅんびちゅう", emoji:"❓", soon:true },
];

const grid = document.getElementById("grid");
let ready = 0;
for(const g of GAMES){
  const el = document.createElement(g.soon ? "div" : "a");
  el.className = "card" + (g.soon ? " soon" : "");
  if(!g.soon){ el.href = g.path; ready++; }
  el.innerHTML =
    `<div class="emoji">${g.emoji||"🎮"}</div>` +
    `<div class="name">${g.name}</div>` +
    (g.soon ? `<div class="badge">じゅんびちゅう</div>` : "");
  grid.appendChild(el);
}
document.getElementById("count").textContent = ready;
</script>
</body>
</html>
