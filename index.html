<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#fff3c4" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-180.png" />
<meta name="apple-mobile-web-app-title" content="こどもあそびば" />
<title>こどもあそびば｜5さいむけ むりょうの ブラウザゲーム</title>
<meta name="description" content="5さいくらいの こども向けの、むりょうで あそべる ブラウザゲームしゅう。ダウンロードふよう・とうろくふよう。スマホやタブレットで すぐに あそべます。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/" />
<!-- OGP（SNSシェアじの みため用）-->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="こどもあそびば｜5さいむけ むりょうの ブラウザゲーム" />
<meta property="og:description" content="5さいくらいの こども向けの、むりょうで あそべる ブラウザゲームしゅう。ダウンロードふよう・とうろくふよう。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />
<meta property="og:locale" content="ja_JP" />
<meta name="twitter:card" content="summary" />
<style>
  /* ── こどもあそびば：ゲームをえらぶ メニューがめん ── */
  :root{
    --bg1:#fff7d6; --bg2:#ffe1b8;
    --ink:#5b4636; --card:#fffdf5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; user-select:none; -webkit-user-select:none;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%,var(--bg1),var(--bg2));
    color:var(--ink);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 40px;
  }
  h1{font-size:30px;font-weight:900;letter-spacing:1px;margin:6px 0 4px;text-align:center;}
  .sub{font-size:15px;color:#8a7a66;margin-bottom:22px;}
  /* ── ゲームのカード ── */
  #grid{
    display:grid;gap:16px;width:100%;max-width:560px;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  }
  .card{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    text-decoration:none;color:var(--ink);
    background:var(--card);border-radius:20px;padding:22px 14px;
    box-shadow:0 6px 0 #e8c98a, 0 12px 20px rgba(0,0,0,.10);
    transition:transform .1s, box-shadow .1s;
    aspect-ratio:1/1;
  }
  .card:active{transform:translateY(4px);box-shadow:0 2px 0 #e8c98a, 0 6px 12px rgba(0,0,0,.10);}
  .card .emoji{font-size:54px;line-height:1;}
  .card .icon{width:84px;height:84px;object-fit:contain;line-height:0;
    border-radius:18px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.12);}
  .card .name{font-size:19px;font-weight:800;text-align:center;white-space:nowrap;}
  /* ── まだ ないゲーム（じゅんびちゅう）── */
  .card.soon{opacity:.55;box-shadow:0 6px 0 #ddd0b0;pointer-events:none;}
  .card.soon .badge{font-size:12px;font-weight:800;color:#a99;background:#fff;border-radius:999px;padding:2px 10px;}
  footer{margin-top:28px;font-size:12px;color:#a99;}
</style>
</head>
<body>
  <h1>🎈 こどもあそびば</h1>
  <div class="sub">すきな あそびを えらんでね</div>
  <div id="grid"></div>
  <footer>つくった あそび：<span id="count">0</span></footer>

<script>
/* =========================================================
   ゲームいちらん。あたらしいゲームは ここに 1ぎょう ふやすだけ。
   path … games/<なまえ>/index.html
   soon … true にすると「じゅんびちゅう」ひょうじ（クリックふか）
   ========================================================= */
const GAMES = [ // ぜんぶで 41本
  { name:"ぱずるぶろっく", emoji:"🧩", img:"icons/puzzle-block.png", path:"games/puzzle-block/index.html" },
  { name:"ぴあの", emoji:"🎹", img:"icons/piano.png", path:"games/piano/index.html" },
  { name:"おえかき", emoji:"🎨", img:"icons/draw.png", path:"games/draw/index.html" },
  { name:"しんけいすいじゃく", emoji:"🃏", img:"icons/memory.png", path:"games/memory/index.html" },
  { name:"かずあそび", emoji:"🔢", img:"icons/numbers.png", path:"games/numbers/index.html" },
  { name:"エアホッケー", emoji:"🏒", img:"icons/airhockey.png", path:"games/airhockey/index.html" },
  { name:"ぬりえ", emoji:"🖍️", img:"icons/coloring.png", path:"games/coloring/index.html" },
  { name:"ひらがな", emoji:"✏️", img:"icons/hiragana.png", path:"games/hiragana/index.html" },
  { name:"ABC", emoji:"🔤", img:"icons/abc.png", path:"games/abc/index.html" },
  { name:"とけい", emoji:"🕐", img:"icons/clock.png", path:"games/clock/index.html" },
  { name:"もぐらたたき", emoji:"🐹", img:"icons/mole.png", path:"games/mole/index.html" },
  { name:"いろまぜ", emoji:"🎨", img:"icons/colormix.png", path:"games/colormix/index.html" },
  { name:"ブロックくずし", emoji:"🧱", img:"icons/breakout.png", path:"games/breakout/index.html" },
  { name:"けいさん", emoji:"🧮", img:"icons/keisan.png", path:"games/keisan/index.html" },
  { name:"キャッチ", emoji:"🧺", img:"icons/catch.png", path:"games/catch/index.html" },
  { name:"さかなつり", emoji:"🎣", img:"icons/fishing.png", path:"games/fishing/index.html" },
  { name:"むしバトル", emoji:"🪲", img:"icons/mushi.png", path:"games/mushi/index.html" },
  { name:"パズル", emoji:"🧩", img:"icons/jigsaw.png", path:"games/jigsaw/index.html" },
  { name:"まるばつ", emoji:"⭕", img:"icons/marubatsu.png", path:"games/marubatsu/index.html" },
  { name:"つみきタワー", emoji:"🗼", img:"icons/tower.png", path:"games/tower/index.html" },
  { name:"はしってジャンプ", emoji:"🏃", img:"icons/run.png", path:"games/run/index.html" },
  { name:"3Dドライブ", emoji:"🚗", img:"icons/drive3d.png", path:"games/drive3d/index.html" },
  { name:"ブロックワールド", emoji:"🟩", img:"icons/blockworld.png", path:"games/blockworld/index.html" },
  { name:"せかいづくり", emoji:"🏞️", img:"icons/scene.png", path:"games/scene/index.html" },
  { name:"おりょうりやさん", emoji:"🍳", img:"icons/cooking.png", path:"games/cooking/index.html" },
  { name:"まちがいさがし", emoji:"🔍", img:"icons/machigai.png", path:"games/machigai/index.html" },
  { name:"ペットのおせわ", emoji:"🐶", img:"icons/pet.png", path:"games/pet/index.html" },
  { name:"シルエットクイズ", emoji:"👤", img:"icons/silhouette.png", path:"games/silhouette/index.html" },
  { name:"おかいものごっこ", emoji:"🛒", img:"icons/shopping.png", path:"games/shopping/index.html" },
  { name:"きせかえ", emoji:"👗", img:"icons/dressup.png", path:"games/dressup/index.html" },
  { name:"こえであそぼ", emoji:"🎤", img:"icons/voice.png", path:"games/voice/index.html" },
  { name:"うごいてキャッチ", emoji:"🙌", img:"icons/movecatch.png", path:"games/movecatch/index.html" },
  { name:"だるまさんがころんだ", emoji:"👀", img:"icons/daruma.png", path:"games/daruma/index.html" },
  { name:"ろうそくフー", emoji:"🎂", img:"icons/candle.png", path:"games/candle/index.html" },
  { name:"パズルバトル", emoji:"🔮", img:"icons/orb.png", path:"games/orb/index.html" },
  { name:"ぐにゃぐにゃカメラ", emoji:"🌀", img:"icons/warp.png", path:"games/warp/index.html" },
  { name:"ふしぎカメラ", emoji:"🪄", img:"icons/funcam.png", path:"games/funcam/index.html" },
  { name:"あみだくじ", emoji:"🪜", img:"icons/amida.png", path:"games/amida/index.html" },
  { name:"レッサーパンダ", emoji:"🦝", img:"icons/redpanda.png", path:"games/redpanda/index.html" },
  { name:"きょうりゅうはっくつ", emoji:"🦖", img:"icons/dino.png", path:"games/dino/index.html" },
  { name:"テトリス", emoji:"🟦", img:"icons/tetris.png", path:"games/tetris/index.html" },
  // れい: { name:"じゅんびちゅう", emoji:"❓", soon:true },
  // img … メニューのアイコン画像（icons/<slug>.png）。読み込み失敗時は emoji にもどる。
];

const grid = document.getElementById("grid");
let ready = 0;
for(const g of GAMES){
  const el = document.createElement(g.soon ? "div" : "a");
  el.className = "card" + (g.soon ? " soon" : "");
  if(!g.soon){ el.href = g.path; ready++; }
  // アイコン画像があれば画像、なければ絵文字。画像が読めなければ絵文字へ自動フォールバック。
  const icon = g.img
    ? `<img class="icon" src="${g.img}" alt="" ` +
      `onerror="this.outerHTML='<div class=\\'emoji\\'>${g.emoji||"🎮"}</div>'">`
    : `<div class="emoji">${g.emoji||"🎮"}</div>`;
  // ながい なまえは じどうで ちいさくして 1ぎょうに おさめる（カードはば内に おさまるよう調整）
  const fs = Math.min(19, Math.floor(118 / g.name.length));
  el.innerHTML =
    icon +
    `<div class="name" style="font-size:${fs}px">${g.name}</div>` +
    (g.soon ? `<div class="badge">じゅんびちゅう</div>` : "");
  grid.appendChild(el);
}
document.getElementById("count").textContent = ready;
</script>
</body>
</html>
