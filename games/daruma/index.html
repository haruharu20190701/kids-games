<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<meta name="mobile-web-app-capable" content="yes" />

<title>だるまさんがころんだ｜こどもあそびば</title>
<meta name="description" content="5さいくらいの こども向けの カメラで あそぶ だるまさんがころんだ。うごいてOKの あいだに すすみ、とまれ！で うごかない。カメラを つかいます（えいぞうは そとに おくりません）。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/daruma/" />

<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="だるまさんがころんだ｜こどもあそびば" />
<meta property="og:description" content="5さいくらいの こども向けの カメラで あそぶ だるまさんがころんだ。とまれ！で うごかないでね。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/daruma/" />

<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#7a4a1e;
    height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;background:#222;}
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#ffd0a0;flex:0 0 auto;z-index:3;}
  #bar #title{font-weight:900;font-size:18px;color:#8a4a14;flex:1;text-align:center;letter-spacing:1px;}
  .hbtn{font-size:22px;width:42px;height:42px;border:none;border-radius:14px;background:#fff;
    box-shadow:0 3px 0 #e7a96e;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;color:#8a4a14;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #e7a96e;}
  #clr{font-size:15px;font-weight:900;color:#e8820a;background:#fff;border-radius:14px;padding:7px 11px;box-shadow:0 3px 0 #e7a96e;white-space:nowrap;}

  #stage{flex:1 1 auto;min-height:0;position:relative;overflow:hidden;background:#111;}
  #vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);background:#111;}
  #cv{position:absolute;inset:0;width:100%;height:100%;min-width:0;min-height:0;}

  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;
    background:rgba(20,15,10,.62);z-index:2;padding:20px;text-align:center;}
  .ov.hide{display:none;}
  .ov .ttl{font-size:24px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.4);}
  .ov .sub{font-size:15px;font-weight:800;color:#ffe9d3;max-width:310px;line-height:1.6;}
  .ov .big{font-size:19px;font-weight:900;border:none;border-radius:20px;padding:15px 26px;cursor:pointer;
    color:#fff;background:#ff9d3c;box-shadow:0 6px 0 #d6741a;}
  .ov .big:active{transform:translateY(3px);box-shadow:0 3px 0 #d6741a;}
  .ov .note{font-size:12px;color:#ffd9b8;}
</style>
</head>
<body>
  <div id="bar">
    <a class="hbtn" href="../../index.html" aria-label="ホーム">🏠</a>
    <div id="title">だるまさんがころんだ</div>
    <div id="clr">🏆0</div>
  </div>

  <div id="stage">
    <video id="vid" playsinline muted autoplay></video>
    <canvas id="cv"></canvas>

    <div class="ov" id="ovStart">
      <div class="ttl">🚦 だるまさんがころんだ</div>
      <div class="sub"><b>みどり</b>（うごいてOK）の あいだに たくさん うごくと すすむよ。<br><b>あか</b>（とまれ！👀）になったら <b>ぴたっと とまろう</b>！</div>
      <button class="big" id="btnStart">📷 カメラを ゆるして はじめる</button>
      <div class="note">えいぞうは この たんまつの なかだけ。どこにも おくりません。</div>
    </div>
    <div class="ov hide" id="ovErr">
      <div class="ttl">カメラが つかえないみたい</div>
      <div class="sub">カメラを「ゆるす」と あそべるよ。ブラウザの せっていを かくにんしてね。</div>
      <button class="big" id="btnErr">もういちど ためす</button>
    </div>
  </div>

<script>
"use strict";
/* =========================================================
   だるまさんがころんだ：カメラの うごき(さぶん)を けんしゅつ。
   みどり=うごくと ゲージが すすむ／あか=うごくと「みつかった」。
   ゴールで クリア。やさしい（みつかっても すこし もどるだけ）。
   ========================================================= */
let actx=null;
function tone(f,d=0.1,t="sine",v=0.13,delay=0){try{
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended")actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),t0=actx.currentTime+delay;
  o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start(t0);g.gain.exponentialRampToValueAtTime(0.001,t0+d);o.stop(t0+d);
}catch(e){}}
function chimeGo(){tone(523,0.12,"sine",0.12);tone(784,0.14,"sine",0.11,0.1);}
function chimeStop(){[700,560,440].forEach((f,i)=>tone(f,0.14,"triangle",0.12,i*0.12));}
function bonk(){tone(150,0.2,"square",0.13);}
function cheer(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,0.16,"sine",0.13,i*0.08));}

const vid=document.getElementById("vid"), cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){const r=cv.getBoundingClientRect();W=r.width;H=r.height;DPR=Math.min(devicePixelRatio||1,2);
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);

// ── うごき けんしゅつ ──
const MW=96,MH=72;
const pcv=document.createElement("canvas");pcv.width=MW;pcv.height=MH;
const pctx=pcv.getContext("2d",{willReadFrequently:true});
let prev=null, motionTotal=0;
function sampleMotion(){
  if(!vid.videoWidth){motionTotal=0;return;}
  pctx.drawImage(vid,0,0,MW,MH);
  let d; try{ d=pctx.getImageData(0,0,MW,MH).data; }catch(e){ motionTotal=0; return; }
  if(!prev){prev=new Uint8Array(MW*MH);}
  let c=0;
  for(let i=0;i<MW*MH;i++){
    const g=(d[i*4]+d[i*4+1]+d[i*4+2])/3|0;
    let df=g-prev[i]; if(df<0)df=-df;
    if(df>22)c++; prev[i]=g;
  }
  motionTotal=c/(MW*MH);    // 0..1（うごいた わりあい）
}

// ── ゲーム ──
let cleared=0; try{cleared=parseInt(localStorage.getItem("darumaCleared")||"0",10)||0;}catch(e){}
const elClr=document.getElementById("clr");
function setClr(){elClr.textContent="🏆"+cleared; try{localStorage.setItem("darumaCleared",cleared);}catch(e){}}

let running=false, last=0, phase="green", tLeft=0, prog=0, caughtFlash=0, oniFlip=0, redSeen=0, banner="";
function setGreen(){phase="green"; tLeft=1.4+Math.random()*2.2; banner="うごいてOK！"; chimeGo();}
function setRed(){phase="red"; tLeft=1.5; redSeen=0; oniFlip=1; banner="とまれ！👀"; chimeStop();}
function resetGame(){prog=0; caughtFlash=0; setTimeout(setGreen,300); phase="wait"; tLeft=0.3; banner="よーい…";}

function update(dt){
  sampleMotion();
  if(oniFlip>0)oniFlip=Math.max(0,oniFlip-dt*4);
  if(caughtFlash>0)caughtFlash=Math.max(0,caughtFlash-dt);
  if(phase==="green"){
    prog=Math.min(100, prog + motionTotal*70*dt);     // うごくほど すすむ
    tLeft-=dt; if(tLeft<=0) setRed();
    if(prog>=100) win();
  }else if(phase==="red"){
    if(redSeen<=0 && motionTotal>0.05){               // あかで うごいた→みつかった
      redSeen=1; caughtFlash=0.8; bonk(); prog=Math.max(0,prog-15);
    }
    tLeft-=dt; if(tLeft<=0) setGreen();
  }
}
function win(){
  running=false; cleared++; setClr(); cheer(); banner="ゴール！🎉";
  for(let i=0;i<14;i++)setTimeout(()=>spark(),i*70);
  setTimeout(()=>{ resetGame(); running=true; },2000);
}
let sparks=[];
function spark(){sparks.push({x:Math.random()*W,y:H*0.3+Math.random()*H*0.3,t:0,e:["⭐","✨","🎊","🌟"][Math.floor(Math.random()*4)]});}

function draw(){
  ctx.clearRect(0,0,W,H);
  const green=(phase==="green");
  // しんごう わく（みどり/あか）
  ctx.strokeStyle = caughtFlash>0 ? "rgba(255,40,40,"+(0.4+0.5*Math.sin(caughtFlash*30))+")" : (green?"rgba(90,210,80,.85)":"rgba(255,70,70,.9)");
  ctx.lineWidth=Math.max(8,W*0.03); ctx.strokeRect(ctx.lineWidth/2,ctx.lineWidth/2,W-ctx.lineWidth,H-ctx.lineWidth);
  // おに（うしろむき🙈=みどり / こっちみる👀=あか）
  const oni= green?"🙈":"👀";
  ctx.save(); ctx.translate(W*0.5,H*0.16);
  const sc=1-0.5*oniFlip; ctx.scale(sc,1);
  ctx.font=`${Math.min(W,H)*0.16}px "Apple Color Emoji","Noto Color Emoji",sans-serif`;
  ctx.textAlign="center";ctx.textBaseline="middle"; ctx.fillText(oni,0,0); ctx.restore();
  // バナー
  ctx.font=`900 ${Math.min(W,H)*0.085}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.lineWidth=Math.max(3,W*0.012); ctx.strokeStyle="rgba(0,0,0,.55)";
  ctx.fillStyle= caughtFlash>0?"#fff": (green?"#bfffb0":"#ffd0d0");
  const by=H*0.31; ctx.strokeText(banner,W*0.5,by); ctx.fillText(banner,W*0.5,by);
  if(caughtFlash>0){ctx.fillStyle="#fff";ctx.font=`900 ${Math.min(W,H)*0.06}px sans-serif`;ctx.strokeText("みつかった！",W*0.5,by+H*0.08);ctx.fillText("みつかった！",W*0.5,by+H*0.08);}
  // ゲージ（した）
  const bx=W*0.1, bw=W*0.8, byy=H*0.9, bh=H*0.045;
  ctx.fillStyle="rgba(255,255,255,.85)"; rr(bx,byy,bw,bh,bh/2); ctx.fill();
  ctx.fillStyle="#5bc24a"; rr(bx,byy,bw*prog/100,bh,bh/2); ctx.fill();
  ctx.font=`${bh*1.3}px "Apple Color Emoji","Noto Color Emoji",sans-serif`; ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText("🏃",bx+bw*prog/100, byy+bh/2); ctx.fillText("🏁",bx+bw+W*0.01,byy+bh/2);
  // スパーク
  for(const s of sparks){s.t+=0.016; ctx.globalAlpha=Math.max(0,1-s.t);ctx.font=`${Math.min(W,H)*0.06}px sans-serif`;ctx.fillText(s.e,s.x,s.y-s.t*60);ctx.globalAlpha=1;}
  sparks=sparks.filter(s=>s.t<1);
}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function loop(t){if(!last)last=t;let dt=(t-last)/1000;last=t;if(dt>0.05)dt=0.05;if(running){update(dt);draw();}requestAnimationFrame(loop);}

// ── カメラ ──
const ovStart=document.getElementById("ovStart"), ovErr=document.getElementById("ovErr");
async function begin(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false});
    vid.srcObject=stream; await vid.play().catch(()=>{});
    resize(); prev=null; sparks=[]; running=true; resetGame();
    ovStart.classList.add("hide"); ovErr.classList.add("hide");
  }catch(e){ ovStart.classList.add("hide"); ovErr.classList.remove("hide"); }
}
document.getElementById("btnStart").addEventListener("click",begin);
document.getElementById("btnErr").addEventListener("click",begin);
addEventListener("contextmenu",e=>e.preventDefault());
setClr(); resize(); requestAnimationFrame(loop);
</script>
</body>
</html>
