<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<meta name="mobile-web-app-capable" content="yes" />

<title>うごいてキャッチ｜こどもあそびば</title>
<meta name="description" content="5さいくらいの こども向けの カメラで あそぶ ゲーム。てや からだを うごかして おちてくる くだものを キャッチ。カメラを つかいます（えいぞうは そとに おくりません）。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/movecatch/" />

<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="うごいてキャッチ｜こどもあそびば" />
<meta property="og:description" content="5さいくらいの こども向けの カメラで あそぶ ゲーム。うごいて おちてくる くだものを キャッチ。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/movecatch/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />

<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#7a4a1e;
    height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;background:#222;}
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#ffd0a0;flex:0 0 auto;z-index:3;}
  #bar #title{font-weight:900;font-size:19px;color:#8a4a14;flex:1;text-align:center;letter-spacing:1px;}
  .hbtn{font-size:22px;width:42px;height:42px;border:none;border-radius:14px;background:#fff;
    box-shadow:0 3px 0 #e7a96e;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;color:#8a4a14;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #e7a96e;}
  #score{font-size:18px;font-weight:900;color:#e8820a;background:#fff;border-radius:14px;padding:6px 12px;box-shadow:0 3px 0 #e7a96e;min-width:64px;text-align:center;}

  #stage{flex:1 1 auto;min-height:0;position:relative;overflow:hidden;background:#111;}
  #vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);background:#111;}
  #cv{position:absolute;inset:0;width:100%;height:100%;min-width:0;min-height:0;}

  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;
    background:rgba(20,15,10,.62);z-index:2;padding:20px;text-align:center;}
  .ov.hide{display:none;}
  .ov .ttl{font-size:25px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.4);}
  .ov .sub{font-size:15px;font-weight:800;color:#ffe9d3;max-width:300px;line-height:1.6;}
  .ov .big{font-size:20px;font-weight:900;border:none;border-radius:20px;padding:15px 28px;cursor:pointer;
    color:#fff;background:#ff9d3c;box-shadow:0 6px 0 #d6741a;}
  .ov .big:active{transform:translateY(3px);box-shadow:0 3px 0 #d6741a;}
  .ov .note{font-size:12px;color:#ffd9b8;}
</style>
</head>
<body>
  <div id="bar">
    <a class="hbtn" href="../../index.html" aria-label="ホーム">🏠</a>
    <div id="title">うごいてキャッチ</div>
    <div id="score">🍎0</div>
  </div>

  <div id="stage">
    <video id="vid" playsinline muted autoplay></video>
    <canvas id="cv"></canvas>

    <div class="ov" id="ovStart">
      <div class="ttl">🙌 うごいて キャッチ！</div>
      <div class="sub">てや からだを うごかして、おちてくる くだものに さわると キャッチできるよ！</div>
      <button class="big" id="btnStart">📷 カメラを ゆるして はじめる</button>
      <div class="note">えいぞうは この たんまつの なかだけ。どこにも おくりません。</div>
    </div>
    <div class="ov hide" id="ovErr">
      <div class="ttl">カメラが つかえないみたい</div>
      <div class="sub">カメラを「ゆるす」と あそべるよ。ブラウザの せっていを かくにんしてね。</div>
      <button class="big" id="btnErr">もういちど ためす</button>
    </div>
  </div>

<script>
"use strict";
/* =========================================================
   うごいてキャッチ：カメラの うごき(まえのフレームとの さぶん)を けんしゅつ。
   おちてくる くだものの ばしょに うごきが あれば キャッチ。
   ・かおにんしき ではなく うごき けんしゅつ（ライブラリ不要）
   ・えいぞうは ローカルしょりのみ（そとに おくらない）
   ========================================================= */
let actx=null;
function tone(f,d=0.08,t="sine",v=0.13,delay=0){try{
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended")actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),t0=actx.currentTime+delay;
  o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start(t0);g.gain.exponentialRampToValueAtTime(0.001,t0+d);o.stop(t0+d);
}catch(e){}}
function pop(){tone(680,0.07,"triangle",0.13);tone(1020,0.08,"sine",0.10,0.04);}
function cheer(){[523,659,784,1047].forEach((f,i)=>tone(f,0.14,"sine",0.12,i*0.07));}

const vid=document.getElementById("vid"), cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){const r=cv.getBoundingClientRect();W=r.width;H=r.height;DPR=Math.min(devicePixelRatio||1,2);
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);

// ── うごき けんしゅつ（ダウンスケール）──
const MW=96,MH=72;
const pcv=document.createElement("canvas");pcv.width=MW;pcv.height=MH;
const pctx=pcv.getContext("2d",{willReadFrequently:true});
let prev=null, mgrid=new Uint8Array(MW*MH);
function sampleMotion(){
  if(!vid.videoWidth) return;
  pctx.drawImage(vid,0,0,MW,MH);
  let d; try{ d=pctx.getImageData(0,0,MW,MH).data; }catch(e){ return; }
  if(!prev) prev=new Uint8Array(MW*MH);
  for(let i=0;i<MW*MH;i++){
    const g=(d[i*4]+d[i*4+1]+d[i*4+2])/3|0;
    let df=g-prev[i]; if(df<0)df=-df;
    mgrid[i]=df>22?1:0; prev[i]=g;
  }
}
function motionAt(sx,sy,rad){          // がめん座標→ミラーグリッドの しゅうへん
  const gx=Math.floor((1-sx/W)*MW), gy=Math.floor(sy/H*MH); let c=0;
  for(let yy=-rad;yy<=rad;yy++)for(let xx=-rad;xx<=rad;xx++){
    const x=gx+xx,y=gy+yy; if(x<0||y<0||x>=MW||y>=MH)continue;
    if(mgrid[y*MW+x])c++;
  }
  return c;
}

// ── ゲーム ──
const EMO=["🍎","🍓","🍌","🍇","🍊","⭐","🎈","🍩","🧁","🍪","🍒","🥝","🍑","🍍"];
function pick(a){return a[Math.floor(Math.random()*a.length)];}
let items=[], parts=[], score=0, last=0, spawnT=0, running=false;
const elScore=document.getElementById("score");

function spawn(){
  const sz=Math.min(W,H)*0.12;
  items.push({x:sz+Math.random()*(W-sz*2), y:-sz, vy:Math.max(70,H*0.12)*(0.8+Math.random()*0.5),
    e:pick(EMO), sz:sz, dead:false});
}
function burst(x,y,e){
  for(let i=0;i<7;i++)parts.push({x,y,vx:(Math.random()*2-1)*160,vy:-Math.random()*180-40,t:0,e:Math.random()<0.5?"✨":e});
}
function update(dt){
  sampleMotion();
  spawnT-=dt; if(spawnT<=0){spawn(); spawnT=Math.max(0.55,1.1-score*0.01);}
  for(const it of items){
    it.y+=it.vy*dt;
    if(!it.dead && it.y>H*0.12 && it.y<H*0.98){
      if(motionAt(it.x,it.y,3)>=5){ it.dead=true; score++; elScore.textContent="🍎"+score; pop(); burst(it.x,it.y,it.e); if(score%10===0)cheer(); }
    }
  }
  items=items.filter(it=>!it.dead && it.y<H+it.sz);
  for(const p of parts){p.t+=dt;p.x+=p.vx*dt;p.vy+=600*dt;p.y+=p.vy*dt;}
  parts=parts.filter(p=>p.t<0.8);
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // うっすら うごき ハイライト（あそんでる かんじ）
  // くだもの
  for(const it of items){
    ctx.font=`${it.sz}px "Apple Color Emoji","Noto Color Emoji",sans-serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(it.e,it.x,it.y);
  }
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,1-p.t/0.8);
    ctx.font=`${Math.min(W,H)*0.07}px "Apple Color Emoji","Noto Color Emoji",sans-serif`;
    ctx.fillText(p.e,p.x,p.y); ctx.globalAlpha=1;
  }
}
function loop(t){
  if(!last)last=t; let dt=(t-last)/1000; last=t; if(dt>0.05)dt=0.05;
  if(running){update(dt);draw();}
  requestAnimationFrame(loop);
}

// ── カメラ ──
const ovStart=document.getElementById("ovStart"), ovErr=document.getElementById("ovErr");
async function begin(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false});
    vid.srcObject=stream; await vid.play().catch(()=>{});
    resize(); items=[];parts=[];score=0;spawnT=0;elScore.textContent="🍎0";
    prev=null; running=true;
    ovStart.classList.add("hide"); ovErr.classList.add("hide"); cheer();
  }catch(e){ ovStart.classList.add("hide"); ovErr.classList.remove("hide"); }
}
document.getElementById("btnStart").addEventListener("click",begin);
document.getElementById("btnErr").addEventListener("click",begin);
addEventListener("contextmenu",e=>e.preventDefault());
resize(); requestAnimationFrame(loop);
</script>
</body>
</html>
