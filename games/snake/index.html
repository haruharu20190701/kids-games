<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>スネーク｜こどもあそびば</title>
<meta name="description" content="ブラウザで あそべる むかしの スネーク。スワイプで へびを うごかして、えさを たべて のばそう。じぶんや かべに ぶつからないでね。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/snake/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="スネーク｜こどもあそびば" />
<meta property="og:description" content="むかしの スネーク。スワイプで へびを うごかして えさを たべよう。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/snake/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />

<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#bfe6cf;
    height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;background:#0a140e;}
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#123322;flex:0 0 auto;}
  #bar #title{font-weight:900;font-size:19px;color:#bfeecf;flex:1;text-align:center;letter-spacing:2px;}
  .hbtn{font-size:22px;width:42px;height:42px;border:none;border-radius:14px;background:#1e4a31;
    box-shadow:0 3px 0 #0b2416;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;color:#bfeecf;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #0b2416;}
  #stage{flex:1 1 auto;min-height:0;position:relative;}
  #cv{display:block;width:100%;height:100%;min-width:0;min-height:0;}
  #ov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(6,16,10,.82);z-index:5;padding:20px;text-align:center;}
  #ov.show{display:flex;}
  #ov .t{font-size:26px;font-weight:900;color:#fff;letter-spacing:2px;}
  #ov .s{font-size:16px;font-weight:800;color:#9fdcb4;}
  #ov .big{font-size:19px;font-weight:900;border:none;border-radius:16px;padding:14px 30px;cursor:pointer;color:#fff;background:#39b46a;box-shadow:0 6px 0 #237a46;}
  #ov .big:active{transform:translateY(3px);box-shadow:0 3px 0 #237a46;}
  #help{flex:0 0 auto;text-align:center;font-size:11px;color:#6b9c7f;padding:5px 0 8px;background:#123322;}
</style>
</head>
<body>
  <div id="bar"><a class="hbtn" href="../../index.html" aria-label="ホーム">🏠</a><div id="title">スネーク</div><div style="width:42px"></div></div>
  <div id="stage"><canvas id="cv"></canvas>
    <div id="ov"><div class="t" id="ovT">ゲームオーバー</div><div class="s" id="ovS"></div><button class="big" id="ovB">もういちど</button></div>
  </div>
  <div id="help">スワイプ（うえ・した・みぎ・ひだり）で むきをかえる</div>
<script>
"use strict";
let actx=null;
function tone(f,d=0.06,t="square",v=0.09,delay=0){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),t0=actx.currentTime+delay;o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start(t0);g.gain.exponentialRampToValueAtTime(0.001,t0+d);o.stop(t0+d);}catch(e){}}
function sEat(){tone(660,0.06,"square",0.1);tone(990,0.06,"square",0.08,0.05);}
function sTurn(){tone(440,0.03,"square",0.05);}
function sOver(){[440,330,247,165].forEach((f,i)=>tone(f,0.2,"sawtooth",0.12,i*0.12));}

const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
const COLS=15, ROWS=20; let PW=0,PH=0,S=1,cell=0,ox=0,oy=0;
function resize(){const r=cv.getBoundingClientRect();S=Math.min(devicePixelRatio||1,2);PW=Math.round(r.width*S);PH=Math.round(r.height*S);cv.width=PW;cv.height=PH;
  cell=Math.floor(Math.min(PW/COLS,PH/ROWS));ox=Math.floor((PW-cell*COLS)/2);oy=Math.floor((PH-cell*ROWS)/2);}
addEventListener("resize",resize);

let snake=[], dir={x:1,y:0}, ndir={x:1,y:0}, food=null, score=0, hi=0, state="play", acc=0, interval=0.18;
try{hi=parseInt(localStorage.getItem("snakeHi")||"0",10)||0;}catch(e){}
function reset(){snake=[{x:7,y:10},{x:6,y:10},{x:5,y:10}];dir={x:1,y:0};ndir={x:1,y:0};score=0;state="play";acc=0;interval=0.18;placeFood();document.getElementById("ov").classList.remove("show");}
function placeFood(){let p;do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(s=>s.x===p.x&&s.y===p.y));food=p;}
function step(){
  dir=ndir; const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.y<0||h.x>=COLS||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){over();return;}
  snake.unshift(h);
  if(food&&h.x===food.x&&h.y===food.y){score++;sEat();placeFood();interval=Math.max(0.075,interval*0.97);}
  else snake.pop();
}
function over(){state="over";sOver();if(score>hi){hi=score;try{localStorage.setItem("snakeHi",hi);}catch(e){}}document.getElementById("ovS").textContent="たべたかず "+score+"　／　さいこう "+hi;document.getElementById("ov").classList.add("show");}
document.getElementById("ovB").addEventListener("click",()=>{tone(660,0.08);reset();});

let sx=0,sy=0;
function pos(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
cv.addEventListener("pointerdown",e=>{const p=pos(e);sx=p.x;sy=p.y;});
cv.addEventListener("pointerup",e=>{const p=pos(e);const dx=p.x-sx,dy=p.y-sy;if(Math.hypot(dx,dy)<18)return;
  let nd; if(Math.abs(dx)>Math.abs(dy))nd={x:dx>0?1:-1,y:0};else nd={x:0,y:dy>0?1:-1};
  if(nd.x===-dir.x&&nd.y===-dir.y)return; ndir=nd; sTurn();});

function draw(){
  ctx.fillStyle="#0c1a12";ctx.fillRect(0,0,PW,PH);
  ctx.fillStyle="#0f2417";ctx.fillRect(ox,oy,cell*COLS,cell*ROWS);
  ctx.strokeStyle="rgba(255,255,255,.03)";ctx.lineWidth=1;
  for(let c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(ox+c*cell+.5,oy);ctx.lineTo(ox+c*cell+.5,oy+cell*ROWS);ctx.stroke();}
  for(let r=1;r<ROWS;r++){ctx.beginPath();ctx.moveTo(ox,oy+r*cell+.5);ctx.lineTo(ox+cell*COLS,oy+r*cell+.5);ctx.stroke();}
  if(food){ctx.fillStyle="#ff5a5a";const fx=ox+food.x*cell+cell/2,fy=oy+food.y*cell+cell/2;ctx.beginPath();ctx.arc(fx,fy,cell*0.36,0,7);ctx.fill();ctx.fillStyle="#7ac043";ctx.fillRect(fx-cell*0.05,fy-cell*0.44,cell*0.1,cell*0.14);}
  for(let i=snake.length-1;i>=0;i--){const s=snake[i];const x=ox+s.x*cell,y=oy+s.y*cell;
    ctx.fillStyle=i===0?"#7dff9a":"#39c46a";ctx.fillRect(x+1,y+1,cell-2,cell-2);
    ctx.fillStyle="rgba(255,255,255,.18)";ctx.fillRect(x+2,y+2,cell-4,cell*0.3);
    if(i===0){ctx.fillStyle="#0a140e";const ex=cell*0.18;ctx.fillRect(x+cell*0.28-ex/2,y+cell*0.35,ex,ex);ctx.fillRect(x+cell*0.72-ex/2,y+cell*0.35,ex,ex);}}
  ctx.fillStyle="#bfeecf";ctx.font=`900 ${cell*0.9}px sans-serif`;ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText("SCORE "+score,ox+2,oy-cell*1.05<0?2:oy-cell*1.05);
}
let last=0;
function loop(t){if(!last)last=t;let dt=(t-last)/1000;last=t;if(dt>0.1)dt=0.1;
  if(state==="play"){acc+=dt;while(acc>=interval){acc-=interval;step();if(state!=="play")break;}}
  draw();requestAnimationFrame(loop);}
addEventListener("contextmenu",e=>e.preventDefault());
resize();reset();requestAnimationFrame(loop);
</script>
</body>
</html>
