<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>さかなつり｜こどもあそびば</title>
<meta name="description" content="5さいくらいの こども向けの さかなつりゲーム。つりざおを おろして さかなを つろう。じかんせいげんなし・しっぱいにやさしい。むりょう・とうろくふよう・スマホ対応。" />

<!-- OGP（SNSシェアじの みため用）-->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="さかなつり｜こどもあそびば" />
<meta property="og:description" content="5さいくらいの こども向けの さかなつり。つりざおで さかなを つろう！" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/fishing/" />

<style>
  /* ── 5さいむけ さかなつり ── */
  :root{ --bg1:#fff7d6; --bg2:#ffe1b8; --ink:#5b4636; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; user-select:none; -webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%,var(--bg1),var(--bg2));
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    height:100dvh;overflow:hidden;touch-action:none;
  }
  #home{position:fixed;left:12px;top:10px;z-index:70;width:46px;height:46px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;background:#fffdf5;box-shadow:0 4px 0 #e8c98a;}
  #home:active{transform:translateY(3px);box-shadow:0 1px 0 #e8c98a;}
  header{width:100%;max-width:560px;text-align:center;padding:8px 14px 0;}
  .title{font-size:21px;font-weight:900;letter-spacing:1px;}
  #hud{font-size:18px;font-weight:900;color:#1a7fb5;margin-top:2px;}
  #stage{flex:1;width:100%;display:flex;align-items:center;justify-content:center;padding:8px 10px 12px;min-height:0;}
  #pad{min-width:0;min-height:0;width:100%;height:100%;max-width:540px;border-radius:18px;touch-action:none;
    box-shadow:0 8px 0 #e8c98a, 0 14px 24px rgba(0,0,0,.12);display:block;}
  #cat{position:fixed;right:10px;top:8px;font-size:34px;z-index:65;animation:bob 2.4s ease-in-out infinite;transform-origin:bottom center;pointer-events:none;}
  #cat.jump{animation:catjump .6s ease;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-5px) rotate(2deg);}}
  @keyframes catjump{0%{transform:translateY(0) scale(1);}30%{transform:translateY(-16px) scale(1.2) rotate(-8deg);}55%{transform:translateY(0) scale(1.08);}100%{transform:translateY(0) scale(1);}}
  #bubble{position:fixed;right:50px;top:14px;z-index:66;background:#fff;border:3px solid #ffd23f;border-radius:14px;
    font-size:14px;font-weight:800;color:#5b4636;white-space:nowrap;box-shadow:0 3px 0 #f0c000;padding:5px 11px;pointer-events:none;
    opacity:0;transform:scale(0);transform-origin:right top;transition:opacity .15s, transform .15s;}
  #bubble.show{opacity:1;transform:scale(1);}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:80;overflow:hidden;}
  .conf{position:absolute;font-size:26px;will-change:transform;}
  #start{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:rgba(91,70,54,.72);z-index:95;padding:20px;}
  #start.hide{display:none;}
  #start .big{font-size:60px;}
  #start .msg{color:#fff;font-weight:900;font-size:18px;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.45);line-height:1.5;}
  #startBtn{border:none;font-family:inherit;font-weight:900;font-size:24px;color:#fff;
    background:linear-gradient(180deg,#7bdc8a,#34c759);border-radius:999px;padding:14px 38px;box-shadow:0 5px 0 #1f9e44;cursor:pointer;}
  #startBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #1f9e44;}
  @media (orientation:landscape) and (max-height:480px){ header{padding:4px 14px 0;} .title{font-size:18px;} #hud{font-size:15px;} #cat{font-size:28px;} }
</style>
</head>
<body>
  <a id="home" href="../../index.html" title="メニューへ">🏠</a>
  <header>
    <div class="title">🎣 さかなつり</div>
    <div id="hud">つった 🐟 <span id="score">0</span></div>
  </header>

  <div id="stage"><canvas id="pad"></canvas></div>

  <div id="cat">🐱</div>
  <div id="bubble"></div>
  <div id="confetti"></div>

  <div id="start">
    <div class="big">🎣</div>
    <div class="msg">ゆびで はりを よこに うごかして<br>タッチで おろす！さかなに あてて つろう</div>
    <button id="startBtn">▶ スタート</button>
  </div>

<script>
/* =========================================================
   5さいむけ さかなつり
   - ゆびで はり(フック)を よこに うごかす → タッチで おろす
   - はりが さかなに あたると ヒット → まきあげて つれる
   - ゲームオーバーなし（やさしい）。10ぴき ごとに おいわい
   - さかな画像／おとは アセット内（無ければ 図形で だいよう）
   ========================================================= */
const FISH=["redfish","bluefish","yellowfish","pufferfish","octopus","crab"];
const FCOL={redfish:"#ef6f53",bluefish:"#3a86ff",yellowfish:"#ffd23f",pufferfish:"#7bdc8a",octopus:"#9b6bd8",crab:"#e63946"};
const imgs={}; FISH.forEach(n=>{const im=new Image();im.src="assets/"+n+".png";imgs[n]=im;});
function ready(n){const im=imgs[n];return im&&im.complete&&im.naturalWidth>0;}

const canvas=document.getElementById("pad"), ctx=canvas.getContext("2d");
let CW=320,CH=480;
let fishes=[], hook={x:160,y:0,state:"aim"}, score=0, running=false;
let surfaceY=0;

let actx=null;
function beep(f,d=0.07,t="sine",v=0.13){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.stop(actx.currentTime+d);}catch(e){}}
function splash(){ beep(300,0.08,"sine",0.10); }
function got(){ [660,880,1175].forEach((f,i)=>setTimeout(()=>beep(f,0.1,"triangle",0.18),i*70)); }
function fanfare(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.17,"triangle",0.2),i*90)); }

const catEl=document.getElementById("cat"),bubbleEl=document.getElementById("bubble");
let bubbleTimer=null;
function catReact(face,word){catEl.textContent=face;catEl.classList.remove("jump");void catEl.offsetWidth;catEl.classList.add("jump");
  if(word){bubbleEl.textContent=word;bubbleEl.classList.add("show");clearTimeout(bubbleTimer);bubbleTimer=setTimeout(()=>bubbleEl.classList.remove("show"),1400);}
  setTimeout(()=>{catEl.textContent="🐱";},900);}
const confEl=document.getElementById("confetti");
function confetti(){const emo=["🎉","⭐","🌟","✨","🎊","🐟","🌈"];for(let i=0;i<22;i++){const s=document.createElement("div");s.className="conf";s.textContent=emo[(Math.random()*emo.length)|0];const x=Math.random()*100,dur=1100+Math.random()*900,delay=Math.random()*250;s.style.left=x+"vw";s.style.top="-40px";s.style.transition=`transform ${dur}ms cubic-bezier(.3,.6,.5,1) ${delay}ms, opacity ${dur}ms ${delay}ms`;confEl.appendChild(s);requestAnimationFrame(()=>{s.style.transform=`translateY(${window.innerHeight+80}px) rotate(${(Math.random()*720-360)|0}deg)`;s.style.opacity="0.2";});setTimeout(()=>s.remove(),dur+delay+100);}}

// ── さかな ──
function spawnFish(){
  const r=Math.max(18,CW*0.06);
  const dir=Math.random()<0.5?1:-1;
  const y=surfaceY+ (CH-surfaceY)*(0.18+Math.random()*0.7);
  fishes.push({x:dir>0?-r:CW+r, y, r, dir, sp:(CW*(0.10+Math.random()*0.14)), type:FISH[(Math.random()*FISH.length)|0], wob:Math.random()*6.28});
}
function ensureFish(){ while(fishes.length<5) spawnFish(); }

function fit(){
  const rect=canvas.getBoundingClientRect();const dpr=Math.min(window.devicePixelRatio||1,2);
  const ow=CW,oh=CH;CW=Math.max(1,Math.round(rect.width));CH=Math.max(1,Math.round(rect.height));
  canvas.width=Math.round(CW*dpr);canvas.height=Math.round(CH*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.lineCap="round";ctx.lineJoin="round";
  surfaceY=CH*0.12;
  if(ow>1){ hook.x*=CW/ow; fishes.forEach(f=>{f.x*=CW/ow; f.y*=CH/oh;}); }
  else hook.x=CW/2;
  hook.x=Math.max(14,Math.min(CW-14,hook.x));
  draw();
}
let rt=null;
window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(fit,150);});
window.addEventListener("orientationchange",()=>{clearTimeout(rt);rt=setTimeout(fit,200);});
if(window.ResizeObserver){const ro=new ResizeObserver(()=>{clearTimeout(rt);rt=setTimeout(fit,60);});ro.observe(canvas);}
window.addEventListener("load",()=>{clearTimeout(rt);rt=setTimeout(fit,60);});

// ── そうさ ──
function aimTo(e){ if(hook.state!=="aim")return; const r=canvas.getBoundingClientRect();hook.x=Math.max(14,Math.min(CW-14,(e.clientX-r.left)/r.width*CW)); }
canvas.addEventListener("pointerdown",(e)=>{e.preventDefault();if(actx&&actx.state==="suspended")actx.resume();
  if(hook.state==="aim"){ aimTo(e); hook.state="drop"; hook.caught=null; splash(); }
  try{canvas.setPointerCapture(e.pointerId);}catch(_){}});
canvas.addEventListener("pointermove",(e)=>{ if(hook.state==="aim"&&(e.buttons||e.pointerType==="touch")){e.preventDefault();aimTo(e);} });

// ── えがく ──
function drawFishShape(f){
  // 図形フォールバック（だ円＋しっぽ）。頭が すすむ むきを むくよう -f.dir
  ctx.save();ctx.translate(f.x,f.y);ctx.scale(-f.dir,1);
  ctx.fillStyle=FCOL[f.type]||"#3a86ff";
  ctx.beginPath();ctx.ellipse(0,0,f.r,f.r*0.66,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(f.r*0.7,0);ctx.lineTo(f.r*1.3,-f.r*0.5);ctx.lineTo(f.r*1.3,f.r*0.5);ctx.closePath();ctx.fill();
  ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(-f.r*0.45,-f.r*0.15,f.r*0.16,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#222";ctx.beginPath();ctx.arc(-f.r*0.45,-f.r*0.15,f.r*0.08,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawFish(f){
  if(ready(f.type)){
    const w=f.r*2.4, h=w*(imgs[f.type].naturalHeight/imgs[f.type].naturalWidth);
    ctx.save();ctx.translate(f.x,f.y);ctx.scale(-f.dir,1);  // 画像は頭が左向き→進行方向へ
    ctx.drawImage(imgs[f.type], -w/2, -h/2, w, h); ctx.restore();
  } else drawFishShape(f);
}
function draw(){
  // うみ
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,"#bfe9ff");g.addColorStop(surfaceY/CH,"#8fd3f4");g.addColorStop(1,"#1f6f9e");
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  // みなも
  ctx.fillStyle="rgba(255,255,255,.35)";ctx.fillRect(0,surfaceY-2,CW,3);
  // さかな
  for(const f of fishes) drawFish(f);
  // いと＋はり
  ctx.strokeStyle="#5b4636";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(hook.x,0);ctx.lineTo(hook.x,hook.y);ctx.stroke();
  ctx.strokeStyle="#888";ctx.lineWidth=3;ctx.beginPath();ctx.arc(hook.x,hook.y+6,6,Math.PI*0.1,Math.PI*1.1);ctx.stroke();
  // つれた さかな（はりに ついてくる）
  if(hook.caught){ hook.caught.x=hook.x; hook.caught.y=hook.y+16; drawFish(hook.caught); }
}

// ── ループ ──
let last=0;
function loop(t){
  if(!running)return;
  if(!last)last=t;let dt=(t-last)/1000;last=t;if(dt>1/30)dt=1/30;
  // さかな およぐ
  for(const f of fishes){
    f.x+=f.dir*f.sp*dt; f.wob+=dt*4; f.y+=Math.sin(f.wob)*0.3;
    if(f.dir>0 && f.x>CW+f.r){ f.x=-f.r; f.y=surfaceY+(CH-surfaceY)*(0.18+Math.random()*0.7);}
    if(f.dir<0 && f.x<-f.r){ f.x=CW+f.r; f.y=surfaceY+(CH-surfaceY)*(0.18+Math.random()*0.7);}
  }
  const HS=CH*1.1; // はりの はやさ
  if(hook.state==="drop"){
    hook.y+=HS*dt;
    if(!hook.caught){
      for(let i=0;i<fishes.length;i++){const f=fishes[i];
        if(Math.abs(f.x-hook.x)<f.r*0.9 && Math.abs(f.y-(hook.y+10))<f.r*0.9){
          hook.caught=fishes.splice(i,1)[0]; got(); hook.state="reel"; break;
        }
      }
    }
    if(hook.y>CH-6){ hook.state="reel"; }
  } else if(hook.state==="reel"){
    hook.y-=HS*dt;
    if(hook.y<=0){
      hook.y=0;
      if(hook.caught){ score++; document.getElementById("score").textContent=score;
        if(score%10===0){ fanfare();confetti();catReact("😻",score+"ひき！"); }
        else catReact("😺","つれた！");
        hook.caught=null; ensureFish();
      }
      hook.state="aim";
    }
  }
  draw();
  requestAnimationFrame(loop);
}

function begin(){document.getElementById("start").classList.add("hide");running=true;last=0;score=0;document.getElementById("score").textContent=0;
  fishes=[];hook={x:CW/2,y:0,state:"aim",caught:null};ensureFish();beep(660,0.06,"sine",0.12);catReact("😺","つろう！");requestAnimationFrame(loop);}
document.getElementById("startBtn").addEventListener("click",begin);

fit(); ensureFish(); draw();
FISH.forEach(n=>imgs[n].addEventListener("load",draw));
</script>
</body>
</html>
