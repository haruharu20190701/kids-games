<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#fff3c4" />
<link rel="apple-touch-icon" href="../../icon-180.png" />
<link rel="icon" type="image/png" href="../../icon-180.png" />
<meta name="apple-mobile-web-app-title" content="しんけいすいじゃく" />
<title>しんけいすいじゃく｜こどもあそびば</title>
<meta name="description" content="5さいくらいの こども向けの しんけいすいじゃく。カードを めくって おなじ えを そろえよう。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/memory/" />
<!-- OGP（SNSシェアじの みため用）-->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="しんけいすいじゃく｜こどもあそびば" />
<meta property="og:description" content="5さいくらいの こども向けの しんけいすいじゃく。カードを めくって おなじ えを そろえよう。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/memory/" />

<meta name="twitter:card" content="summary" />
<style>
  /* ── 5さいむけ しんけいすいじゃく ── */
  :root{ --bg1:#fff7d6; --bg2:#ffe1b8; --ink:#5b4636; --card:#fffdf5; --accent:#ff8fab; --accent2:#ff6b8a; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%,var(--bg1),var(--bg2));
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    height:100dvh;overflow:hidden;touch-action:none;
  }
  #home{
    position:fixed;left:12px;top:10px;z-index:70;
    width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    font-size:24px;text-decoration:none;background:#fffdf5;box-shadow:0 4px 0 #e8c98a;
  }
  #home:active{transform:translateY(3px);box-shadow:0 1px 0 #e8c98a;}
  #top{width:100%;max-width:620px;display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 14px 2px;}
  .title{font-size:21px;font-weight:900;letter-spacing:1px;}
  .tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .tab{
    border:none;font-family:inherit;font-weight:800;font-size:15px;color:var(--ink);
    background:#fffdf5;border-radius:999px;padding:8px 16px;box-shadow:0 3px 0 #e8c98a;cursor:pointer;transition:transform .08s;
  }
  .tab:active{transform:translateY(2px);box-shadow:0 1px 0 #e8c98a;}
  .tab.on{color:#fff;background:linear-gradient(180deg,var(--accent),var(--accent2));box-shadow:0 3px 0 #e04e6e;}
  .stats{display:flex;gap:14px;font-weight:800;font-size:16px;align-items:center;}
  .stats .lab{color:#a98b5a;font-size:13px;}
  /* ── ばん ── */
  #stage{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;padding:6px;}
  #board{display:grid;gap:10px;}
  .card{position:relative;cursor:pointer;}
  .card .inner{
    position:absolute;inset:0;transform-style:preserve-3d;transition:transform .35s;
  }
  .card.up .inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    border-radius:14px;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  }
  .back{
    background:linear-gradient(160deg,#ffd23f,#ff9f45);
    box-shadow:0 5px 0 #d9892f, inset 0 0 0 3px rgba(255,255,255,.5);
    color:#fff;
  }
  .front{
    background:#fffdf5;transform:rotateY(180deg);
    box-shadow:0 5px 0 #e8c98a, inset 0 0 0 3px #ffe9a8;
  }
  .card.matched .front{box-shadow:0 0 0 3px #7bdc8a, 0 0 16px #7bdc8a;animation:matchpop .5s ease;}
  @keyframes matchpop{0%{transform:rotateY(180deg) scale(1);}40%{transform:rotateY(180deg) scale(1.18);}100%{transform:rotateY(180deg) scale(1);}}
  .card.matched{animation:wob .4s ease;}
  @keyframes wob{0%,100%{transform:rotate(0);}30%{transform:rotate(-4deg);}70%{transform:rotate(4deg);}}
  /* ── ねこ ── */
  #cat{position:fixed;right:10px;bottom:8px;font-size:40px;z-index:65;animation:bob 2.4s ease-in-out infinite;transform-origin:bottom center;pointer-events:none;}
  #cat.jump{animation:catjump .6s ease;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-5px) rotate(2deg);}}
  @keyframes catjump{0%{transform:translateY(0) scale(1);}30%{transform:translateY(-20px) scale(1.2) rotate(-8deg);}55%{transform:translateY(0) scale(1.08);}100%{transform:translateY(0) scale(1);}}
  #bubble{
    position:fixed;right:56px;bottom:22px;z-index:66;
    background:#fff;border:3px solid #ffd23f;border-radius:14px;
    font-size:15px;font-weight:800;color:#5b4636;white-space:nowrap;
    box-shadow:0 3px 0 #f0c000;padding:6px 12px;pointer-events:none;
    opacity:0;transform:scale(0);transform-origin:right bottom;transition:opacity .15s, transform .15s;
  }
  #bubble.show{opacity:1;transform:scale(1);}
  .hint{font-size:14px;color:#8a7a66;margin:4px 0 10px;text-align:center;padding:0 12px;}
  /* ── えんしゅつ ── */
  #fx{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:55;}
  .confetti{position:absolute;font-size:24px;animation:confFall var(--dur,1s) ease-in forwards;}
  @keyframes confFall{0%{transform:translate(0,0) rotate(0);opacity:1;}100%{transform:translate(var(--dx,0),110vh) rotate(420deg);opacity:0;}}
  #praise{
    position:fixed;top:42%;left:50%;transform:translate(-50%,-50%) scale(0);
    font-size:44px;font-weight:900;color:#fff;text-shadow:0 4px 0 #ff8fab,0 0 18px #ffd23f;
    pointer-events:none;z-index:60;white-space:nowrap;
  }
  #praise.show{animation:praise 1.4s ease forwards;}
  @keyframes praise{0%{transform:translate(-50%,-50%) scale(0) rotate(-12deg);opacity:0;}25%{transform:translate(-50%,-50%) scale(1.25) rotate(6deg);opacity:1;}70%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-65%) scale(1);opacity:0;}}
  @media (orientation:landscape) and (max-height:480px){
    #top{padding:4px 14px 0;gap:5px;}
    #cat{font-size:30px;}
    .hint{display:none;}
  }
</style>
</head>
<body>
  <a id="home" href="../../index.html" title="メニューへ">🏠</a>
  <div id="top">
    <div class="title">🃏 しんけいすいじゃく</div>
    <div class="tabs">
      <button class="tab on" data-level="easy">かんたん</button>
      <button class="tab" data-level="mid">ふつう</button>
      <button class="tab" data-level="hard">たくさん</button>
    </div>
    <div class="stats">
      <span><span class="lab">そろった</span> <span id="found">0</span>/<span id="total">0</span></span>
      <span><span class="lab">めくり</span> <span id="tries">0</span></span>
    </div>
  </div>

  <div id="stage"><div id="board"></div></div>
  <div class="hint" id="hint">カードを 2まい めくって おなじ えを さがそう！</div>

  <div id="cat">🐱</div>
  <div id="bubble"></div>
  <div id="fx"></div>
  <div id="praise"></div>

<script>
/* =========================================================
   5さいむけ しんけいすいじゃく
   - カードを 2まい めくって おなじ えなら そろう
   - レベル：かんたん(3×2) / ふつう(4×3) / たくさん(4×4)
   - おとは Web Audio で せいせい（ファイル ふよう）
   ========================================================= */
const FACES = ["🐱","🐶","🐰","🐸","🐼","🦁","🐯","🐵","🐷","🐮","🐔","🐧","🦋","🐢","🐙","🦄","🍎","🍓","🍇","🍊"];
const LEVELS = {
  easy:{cols:3, rows:2},   // 6まい・3ペア
  mid: {cols:4, rows:3},   // 12まい・6ペア
  hard:{cols:4, rows:4},   // 16まい・8ペア
};

const boardEl=document.getElementById("board");
const foundEl=document.getElementById("found"), totalEl=document.getElementById("total"), triesEl=document.getElementById("tries");
const catEl=document.getElementById("cat"), bubbleEl=document.getElementById("bubble");
const praiseEl=document.getElementById("praise"), fxEl=document.getElementById("fx");

let level="easy", cols=3, rows=2, pairs=3;
let deck=[];          // {face, el, matched}
let opened=[];        // めくり中（未マッチ）の card
let lock=false, found=0, tries=0;

// ── おと ──
let actx=null;
function beep(freq,dur=0.1,type="sine",vol=0.16){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==="suspended") actx.resume();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    o.connect(g);g.connect(actx.destination);o.start();
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sFlip(){ beep(520,0.07,"sine",0.14); }
function sMatch(){ [659,880,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.14,"triangle",0.2),i*70)); }
function sNo(){ beep(220,0.14,"sawtooth",0.12); }
function fanfare(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.2,"triangle",0.22),i*110)); }

// ── ねこ ──
let bubbleTimer=null;
function catReact(face,word){
  catEl.textContent=face;
  catEl.classList.remove("jump"); void catEl.offsetWidth; catEl.classList.add("jump");
  if(word){ bubbleEl.textContent=word; bubbleEl.classList.add("show"); clearTimeout(bubbleTimer); bubbleTimer=setTimeout(()=>bubbleEl.classList.remove("show"),1300); }
  setTimeout(()=>{catEl.textContent="🐱";},900);
}

// ── シャッフル ──
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ── カードの おおきさを がめんに あわせる ──
let cardPx=80;
function computeCardPx(){
  const topH=document.getElementById("top").getBoundingClientRect().height;
  const hintH=document.querySelector(".hint").getBoundingClientRect().height;
  const widthBudget=Math.min(window.innerWidth*0.94,600);
  const heightBudget=window.innerHeight - topH - hintH - 30;
  const gap=10;
  const byW=(widthBudget-(cols-1)*gap)/cols;
  const byH=(heightBudget-(rows-1)*gap)/rows;
  return Math.max(44, Math.min(120, Math.floor(Math.min(byW,byH))));
}
function applySizes(){
  cardPx=computeCardPx();
  boardEl.style.gridTemplateColumns=`repeat(${cols},${cardPx}px)`;
  deck.forEach(c=>{
    c.el.style.width=cardPx+"px"; c.el.style.height=cardPx+"px";
    c.el.querySelector(".back").style.fontSize=Math.floor(cardPx*0.42)+"px";
    c.el.querySelector(".front").style.fontSize=Math.floor(cardPx*0.5)+"px";
  });
}
let resizeT=null;
window.addEventListener("resize",()=>{clearTimeout(resizeT);resizeT=setTimeout(applySizes,150);});
window.addEventListener("orientationchange",()=>{clearTimeout(resizeT);resizeT=setTimeout(applySizes,200);});

// ── くばる ──
function deal(){
  const L=LEVELS[level]; cols=L.cols; rows=L.rows; pairs=(cols*rows)/2;
  const chosen=shuffle(FACES.slice()).slice(0,pairs);
  const cardsFaces=shuffle(chosen.concat(chosen));
  boardEl.innerHTML=""; deck=[]; opened=[]; lock=false; found=0; tries=0;
  totalEl.textContent=pairs; foundEl.textContent=0; triesEl.textContent=0;
  cardsFaces.forEach((face)=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`<div class="inner"><div class="face back">❓</div><div class="face front">${face}</div></div>`;
    boardEl.appendChild(el);
    const card={face, el, matched:false};
    el.addEventListener("pointerdown",(e)=>{ e.preventDefault(); flip(card); });
    deck.push(card);
  });
  applySizes();
}

// ── めくる ──
function flip(card){
  if(actx&&actx.state==="suspended") actx.resume();
  if(lock || card.matched || opened.includes(card)) return;
  if(opened.length>=2) return;
  card.el.classList.add("up"); sFlip(); opened.push(card);
  if(opened.length===2){
    tries++; triesEl.textContent=tries;
    const [a,b]=opened;
    if(a.face===b.face){
      lock=true;
      setTimeout(()=>{
        a.matched=b.matched=true;
        a.el.classList.add("matched"); b.el.classList.add("matched");
        sMatch(); opened=[]; lock=false;
        found++; foundEl.textContent=found;
        catReact("😻", pick(["やったね！","そろった！","すごい！","ナイス！"]));
        if(found===pairs) win();
      },260);
    }else{
      lock=true;
      catReact("😺","うーん…");
      setTimeout(()=>{ a.el.classList.remove("up"); b.el.classList.remove("up"); sNo(); opened=[]; lock=false; },820);
    }
  }
}
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

// ── クリア ──
function win(){
  setTimeout(()=>{
    praiseEl.textContent=pick(["クリア！","ぜんぶ そろった！","てんさい！","すごーい！"]);
    praiseEl.classList.remove("show"); void praiseEl.offsetWidth; praiseEl.classList.add("show");
    catReact("😻","クリア！"); fanfare(); confetti(44);
    setTimeout(deal, 2800);   // つぎの もんだいへ
  },400);
}
function confetti(n){
  const emo=["🎉","🌈","⭐","💖","✨","🎊","🃏"];
  for(let i=0;i<n;i++){
    const sp=document.createElement("div"); sp.className="confetti"; sp.textContent=pick(emo);
    sp.style.left=(Math.random()*100)+"vw"; sp.style.top="-8vh";
    sp.style.setProperty("--dx",(Math.random()*80-40)+"px");
    sp.style.setProperty("--dur",(1.0+Math.random()*0.8)+"s");
    fxEl.appendChild(sp); setTimeout(()=>sp.remove(),1900);
  }
}

// ── レベル きりかえ ──
document.querySelectorAll("[data-level]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    level=btn.dataset.level;
    document.querySelectorAll("[data-level]").forEach(b=>b.classList.toggle("on",b===btn));
    beep(600,0.06,"sine",0.12); deal();
  });
});

// ── スタート ──
function init(){ deal(); setTimeout(()=>catReact("😺","おなじ えを さがそう！"),500); }
init();
</script>
</body>
</html>
