<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#ffe0ef" />
<title>ろうそくフー｜こどもあそびば</title>
<meta name="description" content="5さいくらいの こども向けの こえ（いき）で あそぶ おたんじょうびごっこ。フー！と ふいて ケーキの ろうそくを けそう。マイクを つかいます（こえは そとに おくりません）。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/candle/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="ろうそくフー｜こどもあそびば" />
<meta property="og:description" content="5さいくらいの こども向けの おたんじょうびごっこ。フー！と ふいて ろうそくを けそう。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/candle/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />
<meta property="og:locale" content="ja_JP" />
<meta name="twitter:card" content="summary" />
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#9a3b6e;
    height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;background:#ffe6f2;}
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#ffc1e0;flex:0 0 auto;z-index:3;}
  #bar #title{font-weight:900;font-size:19px;color:#9a3b6e;flex:1;text-align:center;letter-spacing:1px;}
  .hbtn{font-size:22px;width:42px;height:42px;border:none;border-radius:14px;background:#fff;
    box-shadow:0 3px 0 #e88bb8;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;color:#9a3b6e;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #e88bb8;}
  #cnt{font-size:16px;font-weight:900;color:#d6478f;background:#fff;border-radius:14px;padding:7px 12px;box-shadow:0 3px 0 #e88bb8;white-space:nowrap;}

  #stage{flex:1 1 auto;min-height:0;position:relative;}
  #cv{display:block;width:100%;height:100%;min-width:0;min-height:0;}

  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;
    background:rgba(120,40,80,.40);z-index:2;padding:20px;text-align:center;}
  .ov.hide{display:none;}
  .ov .ttl{font-size:25px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3);}
  .ov .sub{font-size:15px;font-weight:800;color:#ffe6f2;max-width:300px;line-height:1.6;}
  .ov .big{font-size:20px;font-weight:900;border:none;border-radius:20px;padding:15px 28px;cursor:pointer;
    color:#fff;background:#ff7aa8;box-shadow:0 6px 0 #d65383;}
  .ov .big:active{transform:translateY(3px);box-shadow:0 3px 0 #d65383;}
  .ov .note{font-size:12px;color:#ffd6e8;}
</style>
</head>
<body>
  <div id="bar">
    <a class="hbtn" href="../../index.html" aria-label="ホーム">🏠</a>
    <div id="title">ろうそくフー</div>
    <div id="cnt">🎂0</div>
  </div>

  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="ov" id="ovStart">
      <div class="ttl">🎂 ろうそく フー！</div>
      <div class="sub">マイクに むかって <b>フー！</b>と いきを ふきかけると、ろうそくが きえるよ。<br>ぜんぶ けして おたんじょうび おめでとう！</div>
      <button class="big" id="btnStart">🎤 マイクを ゆるして はじめる</button>
      <div class="note">こえは この たんまつの なかだけ。どこにも おくりません。</div>
    </div>
    <div class="ov hide" id="ovErr">
      <div class="ttl">マイクが つかえないみたい</div>
      <div class="sub">マイクを「ゆるす」と あそべるよ。ブラウザの せっていを かくにんしてね。</div>
      <button class="big" id="btnErr">もういちど ためす</button>
    </div>
  </div>

<script>
"use strict";
/* =========================================================
   ろうそくフー：マイクの おおきな おと(=いき フー)で ろうそくを
   ひだりから 1ぽんずつ けす。ぜんぶ きえたら おめでとう→つぎの ケーキ。
   ・こえの おおきさ(RMS)を じどうこうせいで はんてい
   ・こえは ローカルのみ（そとに おくらない）
   ========================================================= */
let actx=null;
function tone(f,d=0.1,t="sine",v=0.13,delay=0){try{
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended")actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),t0=actx.currentTime+delay;
  o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start(t0);g.gain.exponentialRampToValueAtTime(0.001,t0+d);o.stop(t0+d);
}catch(e){}}
function puff(){tone(420,0.12,"sine",0.10);tone(240,0.14,"sine",0.08,0.04);}
function cheer(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,0.18,"sine",0.13,i*0.09));}

const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){const r=cv.getBoundingClientRect();W=r.width;H=r.height;DPR=Math.min(devicePixelRatio||1,2);
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);

// ── マイク（おおきさ）──
let analyser=null, micData=null, micOn=false, noise=0.02, peak=0.10;
async function startMic(){
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended") await actx.resume();
  const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
  const src=actx.createMediaStreamSource(stream);
  analyser=actx.createAnalyser(); analyser.fftSize=1024; analyser.smoothingTimeConstant=0.4;
  micData=new Uint8Array(analyser.fftSize); src.connect(analyser); micOn=true;
}
function readLoud(){
  if(!analyser) return 0;
  analyser.getByteTimeDomainData(micData);
  let s=0; for(let i=0;i<micData.length;i++){const v=(micData[i]-128)/128; s+=v*v;}
  const rms=Math.sqrt(s/micData.length);
  noise += (rms-noise)*(rms<noise?0.05:0.0006);
  peak  += (rms-peak )*(rms>peak ?0.5 :0.0025);
  if(peak < noise+0.03) peak=noise+0.03;
  let L=(rms-noise)/(peak-noise); return L<0?0:L>1?1:L;
}

// ── がぞう（ケーキ）──
const imgCake=new Image(); let cakeOK=false; imgCake.onload=()=>{cakeOK=imgCake.naturalWidth>0;}; imgCake.src="assets/cake.png";

// ── ゲーム ──
let done=0; try{done=parseInt(localStorage.getItem("candleDone")||"0",10)||0;}catch(e){}
const elCnt=document.getElementById("cnt");
function setCnt(){elCnt.textContent="🎂"+done; try{localStorage.setItem("candleDone",done);}catch(e){}}

let running=false,last=0,candles=[],nCand=3,smoothL=0,winT=0,confetti=[];
function newCake(){
  candles=[];
  for(let i=0;i<nCand;i++)candles.push({lit:true,life:1,ph:Math.random()*6});
  winT=0; noise=0.02; peak=0.10;
}
function update(dt){
  const L=readLoud(); smoothL+=(L-smoothL)*Math.min(1,dt*10);
  for(const c of candles) c.ph+=dt*(6+smoothL*20);
  if(winT>0){ winT-=dt; if(winT<=0){ nCand=nCand>=6?3:nCand+1; newCake(); } return; }
  const blowing = smoothL>0.40;
  if(blowing){
    const c=candles.find(c=>c.lit);
    if(c){ c.life-=dt*(1.6+smoothL*2.2); if(c.life<=0){ c.lit=false; puff();
      if(!candles.some(c=>c.lit)) win(); } }
  }
}
function win(){
  done++; setCnt(); cheer(); winT=2.2;
  for(let i=0;i<26;i++)confetti.push({x:Math.random()*W,y:-20-Math.random()*H*0.3,vy:80+Math.random()*120,
    c:["#ff5fa8","#ffd34d","#7ed957","#4db5ff","#c08bff"][i%5],r:Math.random()*6.28,vr:(Math.random()*2-1)*6,t:0});
}

function draw(){
  // パーティーはいけい
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,"#fff0f7");g.addColorStop(1,"#ffd9ec");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // ガーランド（うえ）
  for(let i=0;i<8;i++){ctx.fillStyle=["#ff8fc0","#ffd36b","#8fd98a","#86c5ff","#c79bff"][i%5];
    ctx.beginPath();ctx.arc((i+0.5)*W/8,H*0.06,W*0.018,0,7);ctx.fill();}

  const cx=W*0.5, cakeW=Math.min(W*0.7,H*0.5), cakeTop=H*0.5;
  // ケーキ（がぞう→なければ えがく）
  if(cakeOK){
    const ar=imgCake.naturalWidth/imgCake.naturalHeight, w=cakeW, h=w/ar;
    ctx.drawImage(imgCake, cx-w/2, cakeTop, w, h);
  }else{
    drawCake(cx, cakeTop, cakeW, H*0.34);
  }
  // ろうそく（ケーキの うえ）
  const n=candles.length, span=cakeW*0.74, x0=cx-span/2;
  const cw=Math.max(6,cakeW*0.035), ch=cakeW*0.22, baseY=cakeTop+ (cakeOK? (cakeW/(imgCake.naturalWidth/imgCake.naturalHeight))*0.18 : H*0.02);
  for(let i=0;i<n;i++){
    const x = n===1? cx : x0 + span*i/(n-1);
    const c=candles[i];
    // ろうそく ぼう
    ctx.fillStyle=["#ff6f91","#5bc7ff","#ffd34d","#7ed957","#c08bff"][i%5];
    rr(x-cw/2, baseY-ch, cw, ch, 3); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.5)"; rr(x-cw/2, baseY-ch, cw*0.4, ch, 3); ctx.fill();
    if(c.lit){
      const wob=Math.sin(c.ph)*3 + smoothL*16;
      flame(x, baseY-ch, cw*1.9*(0.7+0.3*c.life), wob);
    }else{
      ctx.fillStyle="rgba(120,120,130,.6)"; ctx.font=`${cw*1.6}px "Apple Color Emoji",sans-serif`;
      ctx.textAlign="center";ctx.textBaseline="bottom"; ctx.fillText("💨",x,baseY-ch);
    }
  }
  // メッセージ
  ctx.textAlign="center";ctx.textBaseline="middle";
  if(winT>0){
    ctx.fillStyle="#e8359a"; ctx.font=`900 ${Math.min(W,H)*0.085}px sans-serif`;
    ctx.fillText("🎉 おめでとう！ 🎉",W*0.5,H*0.2);
  }else{
    const lit=candles.filter(c=>c.lit).length;
    ctx.fillStyle="#9a3b6e"; ctx.font=`900 ${Math.min(W,H)*0.05}px sans-serif`;
    ctx.fillText(lit>0? "フー！で けそう（のこり "+lit+"）" : "",W*0.5,H*0.14);
  }
  // こえメーター（みぎ した）
  meter();
  // こんふぇってぃ
  for(const p of confetti){p.t+=0.016;p.y+=p.vy*0.016;p.r+=p.vr*0.016;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-5,-3,10,6);ctx.restore();}
  confetti=confetti.filter(p=>p.y<H+20);
}
function flame(x,y,s,bend){
  ctx.beginPath();ctx.moveTo(x,y);
  ctx.quadraticCurveTo(x-s*0.5+bend*0.3,y-s*0.7, x+bend, y-s*1.8);
  ctx.quadraticCurveTo(x+s*0.5+bend*0.3,y-s*0.7, x,y);
  ctx.fillStyle="#ff9b21";ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y-s*0.3);
  ctx.quadraticCurveTo(x-s*0.28+bend*0.3,y-s*0.7, x+bend*0.8, y-s*1.25);
  ctx.quadraticCurveTo(x+s*0.28+bend*0.3,y-s*0.7, x,y-s*0.3);
  ctx.fillStyle="#ffe35a";ctx.fill();
}
function drawCake(cx,top,w,h){
  ctx.fillStyle="#ffb3d1"; rr(cx-w/2,top,w,h,18); ctx.fill();         // ほんたい
  ctx.fillStyle="#fff0f6"; rr(cx-w/2,top-8,w,h*0.22,14); ctx.fill();  // クリーム
  ctx.fillStyle="#ff7eb3";
  for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(cx-w/2+ (i+0.5)*w/6, top+h*0.16, w*0.03,0,7);ctx.fill();}
  ctx.fillStyle="#e0789f"; rr(cx-w/2,top+h*0.6,w,h*0.4,14); ctx.fill();
}
function meter(){
  const mw=W*0.06, mh=H*0.34, mx=W-mw-W*0.05, my=H-mh-H*0.06;
  ctx.fillStyle="rgba(255,255,255,.7)"; rr(mx,my,mw,mh,mw/2); ctx.fill();
  const lv=smoothL*mh, g=ctx.createLinearGradient(0,my+mh,0,my);
  g.addColorStop(0,"#7ed957");g.addColorStop(.6,"#ffd34d");g.addColorStop(1,"#ff6b6b");
  ctx.fillStyle=g; rr(mx,my+mh-lv,mw,lv,mw/2); ctx.fill();
  ctx.font=`${mw*0.8}px "Apple Color Emoji",sans-serif`;ctx.textAlign="center";ctx.textBaseline="bottom";
  ctx.fillText("🌬️",mx+mw/2,my-2);
}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function loop(t){if(!last)last=t;let dt=(t-last)/1000;last=t;if(dt>0.05)dt=0.05;if(running)update(dt);draw();requestAnimationFrame(loop);}

// ── スタート ──
const ovStart=document.getElementById("ovStart"), ovErr=document.getElementById("ovErr");
async function begin(){
  try{ if(!micOn) await startMic(); resize(); nCand=3; newCake(); confetti=[]; running=true;
    ovStart.classList.add("hide"); ovErr.classList.add("hide"); cheer();
  }catch(e){ ovStart.classList.add("hide"); ovErr.classList.remove("hide"); }
}
document.getElementById("btnStart").addEventListener("click",begin);
document.getElementById("btnErr").addEventListener("click",begin);
addEventListener("contextmenu",e=>e.preventDefault());
setCnt(); resize(); newCake(); requestAnimationFrame(loop);
</script>
</body>
</html>
