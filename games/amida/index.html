<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#fff3d6" />
<title>あみだくじ｜こどもあそびば</title>
<meta name="description" content="5さいくらいの こども向けの あみだくじ パズル。せんを たどって ゴールに つく スタートを よそうして あてよう。むずかしさは どんどん アップ。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/amida/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="あみだくじ｜こどもあそびば" />
<meta property="og:description" content="5さいくらいの こども向けの あみだくじ パズル。ゴールに つく スタートを あてよう。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/amida/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />
<meta property="og:locale" content="ja_JP" />
<meta name="twitter:card" content="summary" />
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#7a5a1e;
    height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;background:linear-gradient(#fff6e0,#ffe9bf);}
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#ffd98a;flex:0 0 auto;z-index:3;}
  #bar #title{font-weight:900;font-size:19px;color:#8a5a14;flex:1;text-align:center;letter-spacing:1px;}
  .hbtn{font-size:22px;width:42px;height:42px;border:none;border-radius:14px;background:#fff;
    box-shadow:0 3px 0 #d6a850;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;color:#8a5a14;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #d6a850;}
  #score{font-size:14px;font-weight:900;color:#c8761a;background:#fff;border-radius:14px;padding:7px 10px;box-shadow:0 3px 0 #d6a850;white-space:nowrap;}
  #stage{flex:1 1 auto;min-height:0;position:relative;}
  #cv{display:block;width:100%;height:100%;min-width:0;min-height:0;}
</style>
</head>
<body>
  <div id="bar">
    <a class="hbtn" href="../../index.html" aria-label="ホーム">🏠</a>
    <div id="title">あみだくじ</div>
    <div id="score">れんぞく0</div>
  </div>
  <div id="stage"><canvas id="cv"></canvas></div>
<script>
"use strict";
/* =========================================================
   あみだくじ パズル：した の 🎯ゴールに つく スタートを よそうして タップ。
   タップ→たまが せんを たどって せいかい はんてい。れんぞくで レベルUP（せん増/横棒密）。
   ・むずかしさ高め：5ほん〜7ほん・横棒おおめ
   ========================================================= */
let actx=null;
function tone(f,d=0.08,t="sine",v=0.12,delay=0){try{
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended")actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),t0=actx.currentTime+delay;
  o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start(t0);g.gain.exponentialRampToValueAtTime(0.001,t0+d);o.stop(t0+d);
}catch(e){}}
function step(){tone(700,0.04,"square",0.06);}
function ok(){[660,880,1100].forEach((f,i)=>tone(f,0.12,"sine",0.12,i*0.07));}
function ng(){tone(200,0.16,"sawtooth",0.12);}
function cheer(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,0.15,"sine",0.13,i*0.07));}

const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){const r=cv.getBoundingClientRect();W=r.width;H=r.height;DPR=Math.min(devicePixelRatio||1,2);
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);layout();draw();}
addEventListener("resize",resize);

const TOPE=["🐶","🐱","🐰","🐻","🦊","🐯","🐵"];   // スタートの どうぶつ
const LINEC=["#ff6f6f","#ffa23f","#ffd23f","#7ed957","#4ab6ff","#b06bff","#ff7ab0"];
function pick(a){return a[Math.floor(Math.random()*a.length)];}

let level=1, streak=0, best=0;
try{best=parseInt(localStorage.getItem("amidaBest")||"0",10)||0;}catch(e){}
let C=5, R=12, rung=[], goalCol=0, correctStart=0;
let state="idle", chosen=-1, path=null, anim=0, wrongPath=null, msg="", msgCol="#7a5a1e";
const elScore=document.getElementById("score");
function setScore(){elScore.textContent="れんぞく"+streak+"・さいこう"+best;}

// ── レイアウト ──
let topY=0,botY=0,marg=0,usable=0;
function colX(i){return marg + usable*(C===1?0:i/(C-1));}
function rungY(r){return topY + (botY-topY)*(r+1)/(R+1);}
function layout(){ topY=H*0.20; botY=H*0.84; marg=W*0.12; usable=W-marg*2; }
function markR(){return Math.min(usable/(C-1)*0.32, (botY-topY)/(R+1)*0.7, W*0.06);}

// ── もんだい せいせい ──
function build(){
  C=Math.min(5+Math.floor((level-1)/2),7);
  R=Math.min(11+level,20);
  const p=Math.min(0.34+level*0.035,0.62);
  layout();
  rung=[];
  for(let r=0;r<R;r++){
    const row=new Array(C-1).fill(false);
    for(let c=0;c<C-1;c++){
      if(Math.random()<p && !row[c] && !(c>0&&row[c-1])) row[c]=true;
    }
    rung.push(row);
  }
  // たどって start→end を つくる
  const ends=[]; for(let s=0;s<C;s++) ends.push(trace(s).end);
  goalCol=Math.floor(Math.random()*C);
  correctStart=ends.indexOf(goalCol);
  state="idle"; chosen=-1; path=null; wrongPath=null; anim=0;
  msg="🎯ゴールに つく どうぶつは どれ？"; msgCol="#8a5a14";
  draw();
}
function trace(s){
  let col=s; const pts=[{x:colX(col),y:topY}];
  for(let r=0;r<R;r++){
    const y=rungY(r); pts.push({x:colX(col),y});
    if(col<C-1 && rung[r][col]){col++;pts.push({x:colX(col),y});}
    else if(col>0 && rung[r][col-1]){col--;pts.push({x:colX(col),y});}
  }
  pts.push({x:colX(col),y:botY});
  return {pts,end:col};
}
function pathLen(pts){let L=0;for(let i=1;i<pts.length;i++)L+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);return L;}
function pointAt(pts,d){
  for(let i=1;i<pts.length;i++){
    const seg=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    if(d<=seg){const t=seg?d/seg:0;return{x:pts[i-1].x+(pts[i].x-pts[i-1].x)*t,y:pts[i-1].y+(pts[i].y-pts[i-1].y)*t};}
    d-=seg;
  }
  return pts[pts.length-1];
}

// ── にゅうりょく ──
function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
cv.addEventListener("pointerdown",e=>{
  if(state!=="idle")return;
  const p=pos(e); const rr=markR()*1.6;
  for(let i=0;i<C;i++){
    if(Math.hypot(p.x-colX(i),p.y-topY)<rr){ choose(i); return; }
  }
});
function choose(s){
  chosen=s; const tr=trace(s); path=tr.pts; path.end=tr.end;
  state="trace"; anim=0; tracedLen=0; lastStep=0;
}

// ── アニメ ──
let tracedLen=0, lastStep=0, resTimer=0;
function update(dt){
  if(state==="trace"){
    const L=pathLen(path); const sp=Math.max(260,(botY-topY)*0.9);
    tracedLen=Math.min(L,tracedLen+sp*dt);
    const cur=pointAt(path,tracedLen);
    if(cur.y>lastStep+ (botY-topY)/(R+1)){ step(); lastStep=cur.y; }
    if(tracedLen>=L){ finishTrace(); }
  }else if(state==="result"){
    resTimer-=dt; if(resTimer<=0){ if(lastCorrect){level++;}else{level=Math.max(1,level-1);} build(); }
  }
}
let lastCorrect=false;
function finishTrace(){
  const correct = path.end===goalCol;
  lastCorrect=correct; state="result"; resTimer=correct?1.4:2.2;
  if(correct){ streak++; if(streak>best){best=streak;try{localStorage.setItem("amidaBest",best);}catch(e){} }
    setScore(); ok(); cheer(); msg="せいかい！🎉"; msgCol="#3a9a2e"; burst(colX(goalCol),botY);
  }else{ streak=0; setScore(); ng(); msg="ざんねん… せいかいは あの どうぶつ"; msgCol="#d6483a";
    const tr=trace(correctStart); wrongPath=tr.pts; }
}
let sparks=[];
function burst(x,y){for(let i=0;i<14;i++)sparks.push({x,y,vx:(Math.random()*2-1)*180,vy:-Math.random()*220-40,t:0,e:["⭐","✨","🎉","🌟"][i%4]});}

// ── えがく ──
function draw(){
  ctx.clearRect(0,0,W,H);
  // メッセージ
  ctx.fillStyle=msgCol; ctx.font=`900 ${Math.min(W*0.052,22)}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(msg,W*0.5,H*0.105);
  ctx.fillStyle="#b58a3e"; ctx.font=`900 ${Math.min(W*0.036,15)}px sans-serif`;
  ctx.fillText("レベル "+level+"（せん"+C+"ほん）",W*0.5,H*0.15);
  // たての せん
  for(let i=0;i<C;i++){
    ctx.strokeStyle=LINEC[i%LINEC.length]; ctx.lineWidth=Math.max(4,W*0.012); ctx.lineCap="round";
    ctx.beginPath();ctx.moveTo(colX(i),topY);ctx.lineTo(colX(i),botY);ctx.stroke();
  }
  // よこ棒
  ctx.strokeStyle="#9a6a2e"; ctx.lineWidth=Math.max(4,W*0.012);
  for(let r=0;r<R;r++)for(let c=0;c<C-1;c++) if(rung[r] && rung[r][c]){
    const y=rungY(r);ctx.beginPath();ctx.moveTo(colX(c),y);ctx.lineTo(colX(c+1),y);ctx.stroke();
  }
  // せいかいの みち（まちがえた とき・あか）
  if(wrongPath) drawPath(wrongPath, "rgba(255,70,70,.7)", pathLen(wrongPath));
  // たどった みち
  if(path && (state==="trace"||state==="result")) drawPath(path, lastCorrect&&state==="result"?"rgba(60,200,80,.9)":"rgba(40,120,255,.85)", state==="trace"?tracedLen:pathLen(path));
  // スタート（どうぶつ）
  const rad=markR();
  for(let i=0;i<C;i++){
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(colX(i),topY,rad,0,7);ctx.fill();
    ctx.lineWidth=3;ctx.strokeStyle=LINEC[i%LINEC.length];ctx.stroke();
    ctx.font=`${rad*1.3}px "Apple Color Emoji","Noto Color Emoji",sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(TOPE[i%TOPE.length],colX(i),topY);
  }
  // ゴール（した）
  for(let i=0;i<C;i++){
    const isG=i===goalCol;
    ctx.font=`${rad*(isG?1.7:1.2)}px "Apple Color Emoji","Noto Color Emoji",sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(isG?"🎯":"⚪",colX(i),botY+rad*1.4);
  }
  // たま（トレース中）
  if(path && state==="trace"){ const cur=pointAt(path,tracedLen);
    ctx.font=`${rad*1.5}px "Apple Color Emoji",sans-serif`;ctx.fillText(TOPE[chosen%TOPE.length],cur.x,cur.y);
  }
  // スパーク
  for(const s of sparks){ctx.globalAlpha=Math.max(0,1-s.t/1.1);ctx.font=`${Math.min(W,H)*0.06}px sans-serif`;ctx.textAlign="center";ctx.fillText(s.e,s.x,s.y);ctx.globalAlpha=1;}
}
function drawPath(pts,col,upto){
  ctx.strokeStyle=col;ctx.lineWidth=Math.max(6,W*0.02);ctx.lineCap="round";ctx.lineJoin="round";
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);let d=0;
  for(let i=1;i<pts.length;i++){const seg=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    if(d+seg<=upto){ctx.lineTo(pts[i].x,pts[i].y);d+=seg;}
    else{const t=(upto-d)/seg;ctx.lineTo(pts[i-1].x+(pts[i].x-pts[i-1].x)*t,pts[i-1].y+(pts[i].y-pts[i-1].y)*t);break;}
  }
  ctx.stroke();
}

let last=0;
function loop(t){if(!last)last=t;let dt=(t-last)/1000;last=t;if(dt>0.05)dt=0.05;
  update(dt);
  for(const s of sparks){s.t+=dt;s.x+=s.vx*dt;s.vy+=600*dt;s.y+=s.vy*dt;}
  sparks=sparks.filter(s=>s.t<1.1);
  draw(); requestAnimationFrame(loop);
}
addEventListener("contextmenu",e=>e.preventDefault());
setScore(); resize(); build(); requestAnimationFrame(loop);
</script>
</body>
</html>
