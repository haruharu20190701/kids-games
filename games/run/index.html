<!DOCTYPE html>
<html lang="ja">
<head>

<style>
  :root{ --bg1:#fff7d6; --bg2:#ffe1b8; --ink:#5b4636; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; user-select:none; -webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%,var(--bg1),var(--bg2));
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    height:100dvh;overflow:hidden;touch-action:none;
  }
  #home{position:fixed;left:12px;top:10px;z-index:70;width:46px;height:46px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;background:#fffdf5;box-shadow:0 4px 0 #e8c98a;}
  #home:active{transform:translateY(3px);box-shadow:0 1px 0 #e8c98a;}
  header{width:100%;max-width:680px;text-align:center;padding:8px 14px 0;}
  .title{font-size:21px;font-weight:900;letter-spacing:1px;}
  #hud{font-size:17px;font-weight:900;color:#e07b00;margin-top:2px;}
  #hud span{margin:0 8px;}
  #stage{flex:1;width:100%;display:flex;align-items:center;justify-content:center;padding:8px 10px 12px;min-height:0;}
  #pad{min-width:0;min-height:0;width:100%;height:100%;max-width:760px;border-radius:18px;touch-action:none;
    box-shadow:0 8px 0 #e8c98a, 0 14px 24px rgba(0,0,0,.12);display:block;}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:80;overflow:hidden;}
  .conf{position:absolute;font-size:26px;will-change:transform;}
  .ov{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(91,70,54,.72);z-index:95;padding:20px;}
  .ov.show{display:flex;}
  .ov .big{font-size:60px;}
  .ov .msg{color:#fff;font-weight:900;font-size:20px;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.45);line-height:1.5;}
  .ov button{border:none;font-family:inherit;font-weight:900;font-size:23px;color:#fff;
    background:linear-gradient(180deg,#7bdc8a,#34c759);border-radius:999px;padding:14px 38px;box-shadow:0 5px 0 #1f9e44;cursor:pointer;}
  .ov button:active{transform:translateY(3px);box-shadow:0 2px 0 #1f9e44;}
  @media (orientation:landscape) and (max-height:480px){ header{padding:4px 14px 0;} .title{font-size:18px;} #hud{font-size:14px;} }
</style>
</head>
<body>
  <a id="home" href="../../index.html" title="メニューへ">🏠</a>
  <header>
    <div class="title">🏃 はしってジャンプ</div>
    <div id="hud"><span>きょり <b id="dist">0</b>m</span><span>🥕 <b id="carrots">0</b></span></div>
  </header>

  <div id="stage"><canvas id="pad"></canvas></div>
  <div id="confetti"></div>

  <div id="start" class="ov show">
    <div class="big">🐰</div>
    <div class="msg">タップで ジャンプ！<br>サボテンや いわを とびこえて<br>にんじんを あつめよう</div>
    <button id="startBtn">▶ スタート</button>
  </div>
  <div id="over" class="ov">
    <div class="big">🐰💫</div>
    <div class="msg" id="overMsg"></div>
    <button id="retryBtn">もういちど</button>
  </div>

<script>
/* =========================================================
   はしってジャンプ（エンドレスラン）
   - タップで ジャンプ。サボテン/いわを とびこえる
   - にんじんを あつめる、きょりで スコア。だんだん はやく（アクション）
   - あたったら おわり →「○m はしった！」。さいこう記録
   - えは emoji、おとは Web Audio（ファイル ふよう）
   ========================================================= */
const canvas=document.getElementById("pad"), ctx=canvas.getContext("2d");
let CW=320,CH=420, groundY=340, charX=80, S=44;
let charY=0, vy=0, onGround=true, runT=0;
let obstacles=[], carrots=[], clouds=[];
let spd=0, dist=0, carrotN=0, running=false, best=0, groundScroll=0;
let obT=0, caT=0;

const OBS=["🌵","🪨","🌵","🌵"];

// ── おと ──
let actx=null;
function beep(f,d=0.07,t="sine",v=0.13){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.stop(actx.currentTime+d);}catch(e){}}
function jumpSnd(){ beep(520,0.12,"square",0.10); beep(780,0.1,"square",0.08); }
function getSnd(){ beep(880,0.06,"triangle",0.16); beep(1175,0.06,"triangle",0.12); }
function hitSnd(){ beep(160,0.3,"sawtooth",0.18); }
function fanfare(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.16,"triangle",0.2),i*90)); }

const confEl=document.getElementById("confetti");
function confetti(){const emo=["🎉","⭐","🥕","✨","🎊","🐰","🌈"];for(let i=0;i<18;i++){const s=document.createElement("div");s.className="conf";s.textContent=emo[(Math.random()*emo.length)|0];const x=Math.random()*100,dur=1100+Math.random()*900,delay=Math.random()*250;s.style.left=x+"vw";s.style.top="-40px";s.style.transition=`transform ${dur}ms cubic-bezier(.3,.6,.5,1) ${delay}ms, opacity ${dur}ms ${delay}ms`;confEl.appendChild(s);requestAnimationFrame(()=>{s.style.transform=`translateY(${window.innerHeight+80}px) rotate(${(Math.random()*720-360)|0}deg)`;s.style.opacity="0.2";});setTimeout(()=>s.remove(),dur+delay+100);}}

// ── サイズ ──
function fit(){
  const rect=canvas.getBoundingClientRect();const dpr=Math.min(window.devicePixelRatio||1,2);
  CW=Math.max(1,Math.round(rect.width));CH=Math.max(1,Math.round(rect.height));
  canvas.width=Math.round(CW*dpr);canvas.height=Math.round(CH*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.lineCap="round";ctx.lineJoin="round";
  groundY=CH*0.82; charX=CW*0.22; S=Math.max(30,Math.min(70,CH*0.12));
  if(!running){ charY=groundY; }
  draw();
}
let rt=null;
window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(fit,150);});
window.addEventListener("orientationchange",()=>{clearTimeout(rt);rt=setTimeout(fit,200);});
if(window.ResizeObserver){const ro=new ResizeObserver(()=>{clearTimeout(rt);rt=setTimeout(fit,60);});ro.observe(canvas);}
window.addEventListener("load",()=>{clearTimeout(rt);rt=setTimeout(fit,60);});

// ── えがく ──
function emoji(ch,x,y,size,rot){
  ctx.save(); ctx.translate(x,y); if(rot) ctx.rotate(rot);
  ctx.font=size+"px serif"; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillText(ch,0,0); ctx.restore();
}
function draw(){
  // そら
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,"#aee6ff");g.addColorStop(1,"#e7f7ff");
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  // くも
  ctx.fillStyle="rgba(255,255,255,.85)";
  for(const c of clouds){ emoji("☁️",c.x,c.y,c.s,0); }
  // じめん
  ctx.fillStyle="#8fd36a"; ctx.fillRect(0,groundY,CW,CH-groundY);
  ctx.fillStyle="#7bc457"; ctx.fillRect(0,groundY,CW,6);
  // じめんの もよう（スクロール）
  ctx.strokeStyle="rgba(255,255,255,.5)"; ctx.lineWidth=3;
  const step=40; for(let x=-(groundScroll%step);x<CW;x+=step){ ctx.beginPath();ctx.moveTo(x,groundY+18);ctx.lineTo(x+14,groundY+18);ctx.stroke(); }
  // にんじん
  for(const c of carrots){ if(!c.got) emoji("🥕",c.x,c.y,S*0.7,0.3); }
  // しょうがいぶつ
  for(const o of obstacles){ emoji(o.ch,o.x,groundY+2,o.s,0); }
  // キャラ（うさぎ）
  const air = charY<groundY-1;
  const bob = onGround ? Math.sin(runT*16)*2 : 0;
  const rot = air ? (vy<0?-0.18:0.18) : Math.sin(runT*16)*0.06;
  emoji("🐰",charX,charY+bob,S,rot);
}

// ── スタート ──
function startGame(){
  charY=groundY; vy=0; onGround=true; runT=0;
  obstacles=[]; carrots=[]; clouds=[{x:CW*0.3,y:CH*0.2,s:40},{x:CW*0.7,y:CH*0.32,s:32},{x:CW*1.1,y:CH*0.15,s:46}];
  spd=CW*0.42; dist=0; carrotN=0; groundScroll=0;
  obT=1.0; caT=0.7;
  document.getElementById("dist").textContent=0; document.getElementById("carrots").textContent=0;
  running=true; last=0; requestAnimationFrame(loop);
}
function jump(){ if(!running) return; if(onGround){ vy=-CH*1.15; onGround=false; jumpSnd(); } }
canvas.addEventListener("pointerdown",(e)=>{ e.preventDefault(); if(actx&&actx.state==="suspended")actx.resume(); jump(); });

// ── ループ ──
let last=0;
function loop(t){
  if(!running) return;
  if(!last)last=t; let dt=(t-last)/1000; last=t; if(dt>1/30)dt=1/30;
  runT+=dt;
  // スピードアップ
  spd=Math.min(CW*0.95, spd + CW*0.02*dt);
  dist += spd*dt; groundScroll += spd*dt;
  document.getElementById("dist").textContent=Math.floor(dist/40);
  // ジャンプ ぶつり
  vy += CH*2.7*dt; charY += vy*dt;
  if(charY>=groundY){ charY=groundY; vy=0; onGround=true; }
  // くも
  for(const c of clouds){ c.x-=spd*0.15*dt; if(c.x<-50){ c.x=CW+50; c.y=CH*(0.1+Math.random()*0.3); } }
  // しょうがいぶつ せいせい
  obT-=dt;
  if(obT<=0){ const s=S*(0.85+Math.random()*0.4); obstacles.push({ch:OBS[(Math.random()*OBS.length)|0],x:CW+40,s}); obT=Math.max(0.78, (0.95+Math.random()*0.7)); }
  // にんじん せいせい（ジャンプで とれる たかさ）
  caT-=dt;
  if(caT<=0){ carrots.push({x:CW+40,y:groundY-(S*0.6+Math.random()*CH*0.16),got:false}); caT=0.8+Math.random()*1.2; }
  // いどう＆あたり
  const cl=charX-S*0.26, cr=charX+S*0.26, ctop=charY-S*0.72, cbot=charY-S*0.06;
  for(let i=obstacles.length-1;i>=0;i--){ const o=obstacles[i]; o.x-=spd*dt;
    const ow=o.s*0.30, otop=groundY-o.s*0.78;
    if(cr>o.x-ow && cl<o.x+ow && cbot>otop){ gameOver(); return; }
    if(o.x<-60) obstacles.splice(i,1);
  }
  for(let i=carrots.length-1;i>=0;i--){ const c=carrots[i]; c.x-=spd*dt;
    if(!c.got && Math.abs(c.x-charX)<S*0.5 && Math.abs(c.y-(charY-S*0.4))<S*0.6){ c.got=true; carrotN++; document.getElementById("carrots").textContent=carrotN; getSnd();
      if(carrotN%10===0){ confetti(); } }
    if(c.x<-60) carrots.splice(i,1);
  }
  draw();
  requestAnimationFrame(loop);
}

function gameOver(){
  running=false; hitSnd();
  const m=Math.floor(dist/40); best=Math.max(best,m);
  document.getElementById("overMsg").innerHTML=`${m}m はしった！🏃<br>🥕 ${carrotN}こ あつめた<br><span style="font-size:15px">さいこう ${best}m</span>`;
  setTimeout(()=>document.getElementById("over").classList.add("show"),500);
}

document.getElementById("startBtn").addEventListener("click",()=>{
  if(actx&&actx.state==="suspended")actx.resume();
  document.getElementById("start").classList.remove("show"); beep(660,0.06,"sine",0.12); startGame();
});
document.getElementById("retryBtn").addEventListener("click",()=>{
  document.getElementById("over").classList.remove("show"); beep(660,0.06,"sine",0.12); startGame();
});

fit(); draw();
</script>
</body>
</html>
