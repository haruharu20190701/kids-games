<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#ffe1c4" />
<title>レッサーパンダ｜こどもあそびば</title>
<meta name="description" content="5さいくらいの こども向けの レッサーパンダの おせわごっこ。ささ・なでなで・あそび・おふろ・ねんねで にこにこに。ひょうじょうが かわって うごく。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/redpanda/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="レッサーパンダ｜こどもあそびば" />
<meta property="og:description" content="5さいくらいの こども向けの レッサーパンダの おせわごっこ。ささ・なでなで・あそび・おふろ・ねんね。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/redpanda/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />
<meta property="og:locale" content="ja_JP" />
<meta name="twitter:card" content="summary" />
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#7a3f1e;
    height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;background:linear-gradient(#fff1e2,#ffe0c4);}
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#ffc79a;flex:0 0 auto;}
  #bar #title{font-weight:900;font-size:19px;color:#8a3f14;flex:1;text-align:center;letter-spacing:1px;}
  .hbtn{font-size:22px;width:42px;height:42px;border:none;border-radius:14px;background:#fff;
    box-shadow:0 3px 0 #e08a52;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;color:#8a3f14;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #e08a52;}
  #stars{font-size:18px;font-weight:900;color:#e8620a;background:#fff;border-radius:14px;padding:6px 12px;box-shadow:0 3px 0 #e08a52;min-width:58px;text-align:center;}

  /* ── したい こと バブル ── */
  #wantwrap{flex:0 0 auto;display:flex;justify-content:center;padding:10px 10px 2px;}
  #want{background:#fff;border-radius:20px;padding:9px 18px;font-size:19px;font-weight:900;color:#8a3f14;
    box-shadow:0 4px 12px rgba(0,0,0,.12);display:flex;align-items:center;gap:8px;position:relative;}
  #want::after{content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:#fff;}
  #want.beg{animation:beg .7s ease-in-out infinite;}
  @keyframes beg{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  #want .we{font-size:26px;}

  /* ── レッサーパンダ ── */
  #stage{flex:1 1 auto;min-height:0;position:relative;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;padding-bottom:2%;}
  #stage::before{content:"";position:absolute;left:0;right:0;bottom:0;height:24%;background:linear-gradient(#ffd6a6,#eaa86a);}
  /* がいそう＝アイドル（こきゅう＋ゆれ） */
  #petWrap{position:relative;z-index:2;animation:breathe 2.8s ease-in-out infinite;transform-origin:50% 100%;}
  @keyframes breathe{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-5px) scale(1.025);}}
  /* ないそう＝おせわの リアクション */
  #pet{cursor:pointer;line-height:1;display:block;}
  #pet img{width:min(56vw,240px);height:min(56vw,240px);object-fit:contain;display:block;filter:drop-shadow(0 6px 6px rgba(120,60,20,.22));}
  #pet .face{font-size:min(46vw,200px);}
  #pet.hop{animation:hop .55s ease;}
  @keyframes hop{0%,100%{transform:translateY(0) scale(1);}40%{transform:translateY(-26px) scale(1.06);}}
  #pet.munch{animation:munch .38s ease 3;}
  @keyframes munch{0%,100%{transform:scale(1);}50%{transform:scale(.92,1.05);}}
  #pet.wiggle{animation:wiggle .22s ease 5;}
  @keyframes wiggle{0%,100%{transform:rotate(0);}25%{transform:rotate(-5deg);}75%{transform:rotate(5deg);}}
  #pet.spin{animation:spin .6s ease;}
  @keyframes spin{0%{transform:rotate(0);}50%{transform:rotate(8deg) scale(1.04);}100%{transform:rotate(0);}}
  #pet.banzai{animation:banzai .7s cubic-bezier(.3,1.4,.5,1);}
  @keyframes banzai{0%{transform:translateY(0) scale(1);}45%{transform:translateY(-34px) scale(1.12);}100%{transform:translateY(0) scale(1.06);}}
  #mood{position:absolute;top:4%;left:50%;transform:translateX(-50%);z-index:5;font-size:40px;opacity:0;transition:.2s;pointer-events:none;}

  /* えんしゅつ つぶつぶ */
  .fx{position:absolute;z-index:4;pointer-events:none;font-size:38px;animation:fxrise 1.1s ease-out forwards;}
  @keyframes fxrise{0%{opacity:0;transform:translateY(0) scale(.5);}25%{opacity:1;}100%{opacity:0;transform:translateY(-100px) scale(1.3);}}

  /* ── おせわ ボタン ── */
  #acts{flex:0 0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:9px 8px;background:rgba(255,255,255,.45);}
  .act{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;border-radius:16px;background:#fff;
    padding:9px 2px;cursor:pointer;box-shadow:0 4px 0 #e8a875;}
  .act:active{transform:translateY(2px);box-shadow:0 2px 0 #e8a875;}
  .act .ai{font-size:27px;}
  .act .an{font-size:11px;font-weight:900;color:#8a3f14;}
  .act.want{animation:glow 1s infinite;}
  @keyframes glow{0%,100%{box-shadow:0 4px 0 #e8a875;}50%{box-shadow:0 4px 0 #e8a875,0 0 0 4px #ffd34d;}}

  .spark{position:fixed;font-size:30px;pointer-events:none;z-index:30;animation:up 1.1s ease-out forwards;}
  @keyframes up{0%{opacity:1;transform:translateY(0) scale(.6);}100%{opacity:0;transform:translateY(-95px) scale(1.3);}}
</style>
</head>
<body>
  <div id="bar">
    <a class="hbtn" href="../../index.html" aria-label="ホーム">🏠</a>
    <div id="title">レッサーパンダ</div>
    <div id="stars">⭐0</div>
  </div>

  <div id="wantwrap"><div id="want"><span class="we">🎋</span><span id="wantt">ささ たべたい！</span></div></div>

  <div id="stage">
    <div id="mood">😊</div>
    <div id="petWrap"><div id="pet"></div></div>
  </div>

  <div id="acts">
    <button class="act" data-k="food"><span class="ai">🎋</span><span class="an">ささ</span></button>
    <button class="act" data-k="pet"><span class="ai">🤚</span><span class="an">なでなで</span></button>
    <button class="act" data-k="play"><span class="ai">🎾</span><span class="an">あそぶ</span></button>
    <button class="act" data-k="bath"><span class="ai">🛁</span><span class="an">おふろ</span></button>
    <button class="act" data-k="sleep"><span class="ai">😴</span><span class="an">ねんね</span></button>
  </div>

<script>
"use strict";
/* =========================================================
   レッサーパンダの おせわ：したいことを フキダシで しめす → あう おせわで
   だいせいこう（ばんざい立ち姿＋⭐）→ つぎの したいこと。
   ・ひょうじょう/ポーズ画像を じょうたいで さしかえ（assets/redpanda_<pose>.png・なければ えもじ）
   ・がいそうで「こきゅう＋ゆれ」を つねに さいせい＋ときどき じはつ うごき＝いきいき
   ・しっぱいなし・やさしい（5さい〜）
   ========================================================= */
let actx=null;
function tone(f,d=0.09,t="sine",v=0.13,delay=0){try{
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended")actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),t0=actx.currentTime+delay;
  o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start(t0);g.gain.exponentialRampToValueAtTime(0.001,t0+d);o.stop(t0+d);
}catch(e){}}
function happy(){[660,880,1100].forEach((f,i)=>tone(f,0.1,"sine",0.12,i*0.06));}
function blip(){tone(560,0.07,"triangle",0.11);}
function munchS(){tone(300,0.06,"square",0.07);tone(260,0.06,"square",0.06,0.08);}
function snore(){tone(300,0.25,"sine",0.08);tone(220,0.3,"sine",0.07,0.28);}
function cheer(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,0.16,"sine",0.13,i*0.08));}

const POSE_EMOJI={normal:"😊",happy:"🥰",eat:"😋",sleepy:"😴",banzai:"🙌",sad:"🥺"};
const WANTS={
  food :{e:"🎋", t:"ささ たべたい！"},
  pet  :{e:"🤚", t:"なでなで して！"},
  play :{e:"🎾", t:"ボールで あそびたい！"},
  bath :{e:"🛁", t:"おふろ はいりたい！"},
  sleep:{e:"😴", t:"ねむい… ねんね したい"},
};
const FX={food:["🎋","🍃","😋"],pet:["💕","💖","🥰"],play:["🎾","⚽","🤸"],bath:["🫧","🛁","✨"],sleep:["💤","😴","🌙"]};
function pick(a){return a[Math.floor(Math.random()*a.length)];}

let stars=0, want="food", curPose="normal", busy=false, neglect=0;
try{stars=parseInt(localStorage.getItem("redpandaStars")||"0",10)||0;}catch(e){}

const elPet=document.getElementById("pet"), elMood=document.getElementById("mood");
const elStars=document.getElementById("stars"), elWantE=document.querySelector("#want .we"), elWantT=document.getElementById("wantt");
const elWant=document.getElementById("want"), elStage=document.getElementById("stage");

function setStars(){elStars.textContent="⭐"+stars; try{localStorage.setItem("redpandaStars",stars);}catch(e){}}
function setPose(p){
  curPose=p;
  elPet.innerHTML=`<img src="assets/redpanda_${p}.png" alt="${POSE_EMOJI[p]}" draggable="false" `+
    `onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'face',textContent:this.alt}))">`;
}
function react(cls,dur){ elPet.classList.remove("hop","munch","wiggle","spin","banzai"); void elPet.offsetWidth; elPet.classList.add(cls); setTimeout(()=>elPet.classList.remove(cls),dur); }
function moodShow(face){elMood.textContent=face;elMood.style.opacity="1";setTimeout(()=>elMood.style.opacity="0",1000);}

function newWant(){
  const ks=Object.keys(WANTS); want=pick(ks);
  elWantE.textContent=WANTS[want].e; elWantT.textContent=WANTS[want].t;
  document.querySelectorAll(".act").forEach(b=>b.classList.toggle("want", b.dataset.k===want));
  elWant.classList.remove("beg"); neglect=0;
}
function fxBurst(kind){
  const r=elStage.getBoundingClientRect();
  for(let i=0;i<5;i++){
    const f=document.createElement("div"); f.className="fx"; f.textContent=pick(FX[kind]);
    f.style.left=(r.width*(0.3+Math.random()*0.4))+"px";
    f.style.top=(r.height*(0.4+Math.random()*0.25))+"px";
    f.style.animationDelay=(Math.random()*0.2)+"s";
    elStage.appendChild(f); setTimeout(()=>f.remove(),1100);
  }
}
function sparkle(){
  const r=elPet.getBoundingClientRect();
  for(let i=0;i<9;i++){
    const s=document.createElement("div"); s.className="spark"; s.textContent=pick(["⭐","✨","🌟","💛","💕"]);
    s.style.left=(r.left+r.width*(0.1+Math.random()*0.8))+"px";
    s.style.top=(r.top+r.height*(0.1+Math.random()*0.6))+"px";
    s.style.animationDelay=(Math.random()*0.2)+"s";
    document.body.appendChild(s); setTimeout(()=>s.remove(),1150);
  }
}

function doAction(k){
  if(busy) return;
  neglect=0; elWant.classList.remove("beg");
  // おせわごとの ポーズ＋アニメ＋つぶつぶ
  if(k==="food"){ setPose("eat"); react("munch",1200); munchS(); }
  else if(k==="pet"){ setPose("happy"); react("wiggle",1200); }
  else if(k==="play"){ setPose("happy"); react("hop",560); }
  else if(k==="bath"){ setPose("happy"); react("wiggle",1200); }
  else if(k==="sleep"){ setPose("sleepy"); snore(); }
  fxBurst(k);

  if(k===want){
    busy=true; happy();
    setTimeout(()=>{                         // リアクションの あと だいせいこう＝ばんざい
      setPose("banzai"); react("banzai",700); moodShow(pick(["🙌","😻","🤩","🎉"]));
      cheer(); stars++; setStars(); sparkle();
      setTimeout(()=>{ busy=false; setPose("normal"); newWant(); },1000);
    },650);
  }else{
    blip(); moodShow("🙂");
    setTimeout(()=>{ if(!busy) setPose("normal"); },1100);   // ふつうに もどる（want はそのまま）
  }
}
document.querySelectorAll(".act").forEach(b=>b.addEventListener("click",()=>doAction(b.dataset.k)));
elPet.addEventListener("click",()=>doAction("pet"));

// ── じはつ うごき（とまってる かんを なくす）＋ ほうち→しょんぼり ──
function tick(){
  if(!busy){
    neglect++;
    if(neglect>=8 && curPose!=="sad"){ setPose("sad"); elWant.classList.add("beg"); moodShow("🥺"); }
    else if(neglect<8 && curPose==="normal" && Math.random()<0.5){
      react(pick(["hop","wiggle","spin"]), 600);   // ときどき ぴょこ・くるっ
      tone(700,0.05,"sine",0.05);
    }
  }
  setTimeout(tick, 1600+Math.random()*1600);
}

window.addEventListener("contextmenu",e=>e.preventDefault());
// スタート
setStars(); setPose("normal"); newWant(); tick();
</script>
</body>
</html>
