<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#bfe3ff" />
<title>こえであそぼ｜こどもあそびば</title>
<meta name="description" content="5さいくらいの こども向けの こえで あそぶ ゲーム。こえの おおきさで とりが あがって、あなを とおそう。マイクを つかいます（こえは そとに おくりません）。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/voice/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="こえであそぼ｜こどもあそびば" />
<meta property="og:description" content="5さいくらいの こども向けの こえで あそぶ ゲーム。こえの おおきさで とりを とばして あなを とおそう。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/voice/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />
<meta property="og:locale" content="ja_JP" />
<meta name="twitter:card" content="summary" />
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#1f5b8f;
    height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;background:#bfe3ff;}
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#aed8ff;flex:0 0 auto;z-index:3;}
  #bar #title{font-weight:900;font-size:19px;color:#1f5b8f;flex:1;text-align:center;letter-spacing:1px;}
  .hbtn{font-size:22px;width:42px;height:42px;border:none;border-radius:14px;background:#fff;
    box-shadow:0 3px 0 #7fb6e6;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;color:#1f5b8f;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #7fb6e6;}
  #best{font-size:15px;font-weight:900;color:#1f5b8f;background:#fff;border-radius:14px;padding:7px 11px;box-shadow:0 3px 0 #7fb6e6;white-space:nowrap;}

  #stage{flex:1 1 auto;min-height:0;position:relative;}
  #cv{display:block;width:100%;height:100%;min-width:0;min-height:0;}

  /* ── スタート／リトライ オーバーレイ ── */
  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:rgba(20,60,100,.34);z-index:2;padding:20px;text-align:center;}
  .ov.hide{display:none;}
  .ov .ttl{font-size:26px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3);}
  .ov .sub{font-size:15px;font-weight:800;color:#eaf6ff;max-width:300px;line-height:1.6;}
  .ov .big{font-size:20px;font-weight:900;border:none;border-radius:20px;padding:15px 30px;cursor:pointer;
    color:#fff;background:#ff7aa8;box-shadow:0 6px 0 #d65383;}
  .ov .big:active{transform:translateY(3px);box-shadow:0 3px 0 #d65383;}
  .ov .big.go{background:#5bc24a;box-shadow:0 6px 0 #3f9a31;}
  .ov .big.go:active{box-shadow:0 3px 0 #3f9a31;}
  .ov .note{font-size:12px;color:#cfe6ff;}
</style>
</head>
<body>
  <div id="bar">
    <a class="hbtn" href="../../index.html" aria-label="ホーム">🏠</a>
    <div id="title">こえであそぼ</div>
    <div id="best">⭐0</div>
  </div>

  <div id="stage">
    <canvas id="cv"></canvas>

    <div class="ov" id="ovStart">
      <div class="ttl">🎤 こえで とばそう！</div>
      <div class="sub">おおきな こえを だすと とりが <b>あがる</b>よ。<br>しずかにすると <b>さがる</b>。<br>こえで たかさを かえて あなを とおそう！</div>
      <button class="big go" id="btnStart">🎤 マイクを ゆるして はじめる</button>
      <div class="note">こえは この たんまつの なかだけ。どこにも おくりません。</div>
    </div>

    <div class="ov hide" id="ovRetry">
      <div class="ttl" id="retryTtl">ドンマイ！</div>
      <div class="sub" id="retrySub"></div>
      <button class="big" id="btnRetry">もういちど 🎤</button>
    </div>

    <div class="ov hide" id="ovErr">
      <div class="ttl">マイクが つかえないみたい</div>
      <div class="sub" id="errSub">マイクを「ゆるす」と あそべるよ。<br>ブラウザの せっていを かくにんしてね。</div>
      <button class="big go" id="btnErr">もういちど ためす</button>
    </div>
  </div>

<script>
"use strict";
/* =========================================================
   こえであそぼ：マイクの こえの おおきさ(RMS)で とりが 上下。
   おおきい こえ→上、しずか→下。あなの あいた かべを とおす。
   ・じどう キャリブレーション（その子の こえに あわせる）
   ・5さい向け：あな おおきめ・ゆっくり・ぶつかってもリトライ
   ・こえは ローカルかいせきのみ（そとに おくらない）
   ========================================================= */
let actx=null;
function tone(f,d=0.09,t="sine",v=0.13,delay=0){try{
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended")actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),t0=actx.currentTime+delay;
  o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start(t0);g.gain.exponentialRampToValueAtTime(0.001,t0+d);o.stop(t0+d);
}catch(e){}}
function ding(){tone(740,0.08,"triangle",0.12);tone(1100,0.10,"sine",0.10,0.05);}
function bonk(){tone(150,0.18,"square",0.12);}
function cheer(){[523,659,784,1047].forEach((f,i)=>tone(f,0.15,"sine",0.12,i*0.07));}

// ── canvas ──
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){
  const r=cv.getBoundingClientRect(); W=r.width; H=r.height;
  DPR=Math.min(window.devicePixelRatio||1,2);
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize",resize);

// ── マイク ──
let analyser=null, micData=null, micOn=false;
async function startMic(){
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended") await actx.resume();
  const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
  const src=actx.createMediaStreamSource(stream);
  analyser=actx.createAnalyser(); analyser.fftSize=1024; analyser.smoothingTimeConstant=0.3;
  micData=new Uint8Array(analyser.fftSize);
  src.connect(analyser); micOn=true;
}
function readLoud(){            // 0..1 の こえの おおきさ（じどうこうせい）
  if(!analyser) return 0;
  analyser.getByteTimeDomainData(micData);
  let s=0; for(let i=0;i<micData.length;i++){const v=(micData[i]-128)/128; s+=v*v;}
  const rms=Math.sqrt(s/micData.length);
  // ノイズフロアは ゆっくり下げ、ピークは すばやく上げて ゆっくり下げる
  noise += (rms-noise)*(rms<noise?0.05:0.0006);
  peak  += (rms-peak )*(rms>peak ?0.5 :0.0025);
  if(peak < noise+0.03) peak=noise+0.03;
  let L=(rms-noise)/(peak-noise);
  return L<0?0:L>1?1:L;
}
let noise=0.02, peak=0.10;

// ── じょうたい ──
let best=0; try{best=parseInt(localStorage.getItem("voiceBest")||"0",10)||0;}catch(e){}
const elBest=document.getElementById("best");
function setBest(){elBest.textContent="⭐"+best; try{localStorage.setItem("voiceBest",best);}catch(e){}}

let state="idle";   // idle / play / dead
let ballY=0, smoothL=0, score=0, walls=[], spawnX=0, last=0, hitCool=0;
const BIRD="🐤";

function reset(){
  ballY=H*0.5; smoothL=0; score=0; walls=[]; hitCool=0;
  spawnX=W+W*0.2;
  noise=0.02; peak=0.10;
}
function spawnWall(x){
  const gapH=H*0.42;
  const gapTop=H*0.12 + Math.random()*(H*0.46);
  walls.push({x:x, gapTop:gapTop, gapH:gapH, passed:false});
}

function update(dt){
  const L=readLoud(); smoothL += (L-smoothL)*Math.min(1,dt*12);
  // めひょうの たかさ：こえ おおきい→うえ
  const top=H*0.10, bot=H*0.90;
  const target=bot - smoothL*(bot-top);
  ballY += (target-ballY)*Math.min(1,dt*9);
  if(ballY<top*0.6)ballY=top*0.6; if(ballY>H*0.97)ballY=H*0.97;

  const spd=Math.max(90, W*0.32);   // よこ移動 px/s
  for(const w of walls) w.x-=spd*dt;
  // スポーン（よこ かんかく）
  if(!walls.length || walls[walls.length-1].x < W-W*0.74){ spawnWall(W+W*0.12); }
  // ふるい かべを けす
  while(walls.length && walls[0].x < -W*0.2) walls.shift();

  const bx=W*0.28, r=Math.min(W,H)*0.045, ww=W*0.15;
  for(const w of walls){
    if(!w.passed && w.x+ww < bx-r){ w.passed=true; score++; ding(); if(score>best){best=score;setBest();} }
    if(hitCool<=0 && bx+r>w.x && bx-r<w.x+ww){
      if(ballY-r<w.gapTop || ballY+r>w.gapTop+w.gapH){ onHit(); break; }
    }
  }
  if(hitCool>0) hitCool-=dt;
}
function onHit(){
  bonk();
  state="dead";
  document.getElementById("retrySub").textContent="「"+score+"」こ とおれたよ！ ⭐さいこう "+best;
  document.getElementById("ovRetry").classList.remove("hide");
}

// ── えがく ──
function draw(){
  // そら
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,"#bfe9ff"); g.addColorStop(1,"#e8f7ff");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // くも（うっすら）
  ctx.fillStyle="rgba(255,255,255,.55)";
  for(let i=0;i<3;i++){const cx=((i*W/3)+ (last*0.01)%(W))%W; cloud(cx, H*(0.18+0.2*i), H*0.05);}
  // かべ
  const ww=W*0.15;
  for(const w of walls){
    drawPipe(w.x, 0, ww, w.gapTop);                 // うえ
    drawPipe(w.x, w.gapTop+w.gapH, ww, H-(w.gapTop+w.gapH)); // した
  }
  // とり
  const bx=W*0.28;
  ctx.save();
  if(state==="dead"||hitCool>0) ctx.globalAlpha=0.6;
  ctx.font=`${Math.min(W,H)*0.11}px "Apple Color Emoji","Noto Color Emoji",sans-serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(BIRD, bx, ballY);
  ctx.restore();
  // こえメーター（ひだり）
  meter();
  // スコア
  ctx.fillStyle="#1f5b8f"; ctx.font=`900 ${H*0.09}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.fillText(score, W*0.5, H*0.04);
}
function cloud(x,y,s){ctx.beginPath();ctx.arc(x,y,s,0,7);ctx.arc(x+s,y+s*0.2,s*0.8,0,7);ctx.arc(x-s,y+s*0.2,s*0.8,0,7);ctx.fill();}
function drawPipe(x,y,w,h){
  if(h<=0)return;
  ctx.fillStyle="#6cc24a"; roundRect(x,y,w,h,8); ctx.fill();
  ctx.fillStyle="#56a83a"; roundRect(x-2,(y===0?h-14:y),w+4,14,7); ctx.fill();
  ctx.strokeStyle="rgba(0,0,0,.08)"; ctx.lineWidth=2; roundRect(x,y,w,h,8); ctx.stroke();
}
function roundRect(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function meter(){
  const mx=W*0.045, mw=W*0.035, my=H*0.12, mh=H*0.76;
  ctx.fillStyle="rgba(255,255,255,.7)"; roundRect(mx,my,mw,mh,mw/2); ctx.fill();
  const lvl=smoothL*mh;
  const g=ctx.createLinearGradient(0,my+mh,0,my); g.addColorStop(0,"#7ed957");g.addColorStop(.6,"#ffd34d");g.addColorStop(1,"#ff6b6b");
  ctx.fillStyle=g; roundRect(mx,my+mh-lvl,mw,lvl,mw/2); ctx.fill();
  ctx.font=`${W*0.05}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="bottom";
  ctx.fillText("🔊", mx+mw/2, my-2);
}

// ── ループ ──
function loop(t){
  if(!last)last=t; let dt=(t-last)/1000; last=t; if(dt>0.05)dt=0.05;
  if(state==="play") update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── ボタン ──
const ovStart=document.getElementById("ovStart"), ovRetry=document.getElementById("ovRetry"), ovErr=document.getElementById("ovErr");
async function begin(){
  try{
    if(!micOn) await startMic();
    resize(); reset(); state="play";
    ovStart.classList.add("hide"); ovRetry.classList.add("hide"); ovErr.classList.add("hide");
    cheer();
  }catch(e){
    ovStart.classList.add("hide"); ovRetry.classList.add("hide");
    ovErr.classList.remove("hide");
  }
}
document.getElementById("btnStart").addEventListener("click",begin);
document.getElementById("btnRetry").addEventListener("click",()=>{ reset(); state="play"; ovRetry.classList.add("hide"); cheer(); });
document.getElementById("btnErr").addEventListener("click",begin);

window.addEventListener("contextmenu",e=>e.preventDefault());
// スタート
setBest(); resize(); ballY=H*0.5; requestAnimationFrame(loop);
</script>
</body>
</html>
