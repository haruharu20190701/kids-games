<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#070a16" />
<title>シューティング｜こどもあそびば</title>
<meta name="description" content="ブラウザで あそべる たてスクロール シューティング。ドラッグで うごかして じどうで れんしゃ。てきの なみを たおして、ボスを やっつけよう。むりょう・とうろくふよう・スマホ対応。" />
<link rel="canonical" href="https://haruharu20190701.github.io/kids-games/games/shooter/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="こどもあそびば" />
<meta property="og:title" content="シューティング｜こどもあそびば" />
<meta property="og:description" content="たてスクロール シューティング。ドラッグで うごかして じどう れんしゃ。ボスを やっつけよう。" />
<meta property="og:url" content="https://haruharu20190701.github.io/kids-games/games/shooter/" />
<meta property="og:image" content="https://haruharu20190701.github.io/kids-games/icon-1024.png" />
<meta property="og:locale" content="ja_JP" />
<meta name="twitter:card" content="summary" />
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#cfe0ff;
    height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none;background:#070a16;}
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#101a36;flex:0 0 auto;z-index:3;}
  #bar #title{font-weight:900;font-size:18px;color:#bcd4ff;flex:1;text-align:center;letter-spacing:2px;}
  .hbtn{font-size:22px;width:42px;height:42px;border:none;border-radius:14px;background:#22305a;
    box-shadow:0 3px 0 #0c1428;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;color:#bcd4ff;}
  .hbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #0c1428;}
  #stage{flex:1 1 auto;min-height:0;position:relative;background:#05070f;}
  #cv{display:block;width:100%;height:100%;min-width:0;min-height:0;}
  #ov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:rgba(5,8,18,.82);z-index:5;padding:20px;text-align:center;}
  #ov.show{display:flex;}
  #ov .t{font-size:28px;font-weight:900;color:#fff;letter-spacing:2px;}
  #ov .s{font-size:16px;font-weight:800;color:#9fc0ff;}
  #ov .big{font-size:19px;font-weight:900;border:none;border-radius:16px;padding:14px 30px;cursor:pointer;color:#fff;background:#3b7bff;box-shadow:0 6px 0 #2350b0;}
  #ov .big:active{transform:translateY(3px);box-shadow:0 3px 0 #2350b0;}
</style>
</head>
<body>
  <div id="bar">
    <a class="hbtn" href="../../index.html" aria-label="ホーム">🏠</a>
    <div id="title">シューティング</div>
    <div style="width:42px"></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="ov"><div class="t" id="ovT">GAME OVER</div><div class="s" id="ovS"></div><button class="big" id="ovB">もういちど</button></div>
  </div>
<script>
"use strict";
/* =========================================================
   たてスクロール シューティング（昔ながらのSTG）：
   ・ドラッグで自機移動＋自動連射。敵の波→撃破→スコア。被弾でミス(ライフ3)。
   ・P でショット強化(1→3way)。数十秒ごとに ボス。星空・爆発・効果音。
   ・自機/敵/ボス/パワーは 生成画像（なければ canvas図形）。
   ========================================================= */
let actx=null;
function tone(f,d=0.05,t="square",v=0.08,delay=0){try{
  actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended")actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(),t0=actx.currentTime+delay;
  o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start(t0);g.gain.exponentialRampToValueAtTime(0.001,t0+d);o.stop(t0+d);
}catch(e){}}
function sShot(){tone(880,0.03,"square",0.04);}
function sBoom(){tone(120,0.12,"sawtooth",0.09);tone(80,0.16,"sawtooth",0.07,0.02);}
function sHit(){tone(200,0.18,"sawtooth",0.12);[400,260,160].forEach((f,i)=>tone(f,0.12,"square",0.08,i*0.06));}
function sPow(){[600,800,1100].forEach((f,i)=>tone(f,0.1,"sine",0.12,i*0.05));}
function sBoss(){[160,160,200,160].forEach((f,i)=>tone(f,0.18,"sawtooth",0.1,i*0.18));}
function sOver(){[440,330,247,165].forEach((f,i)=>tone(f,0.22,"sawtooth",0.12,i*0.13));}

const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let PW=0,PH=0,S=1,U=1;
function resize(){const r=cv.getBoundingClientRect();S=Math.min(devicePixelRatio||1,2);
  PW=Math.round(r.width*S);PH=Math.round(r.height*S);cv.width=PW;cv.height=PH;U=Math.min(PW,PH);
  if(player){player.x=Math.max(player.r,Math.min(PW-player.r,player.x));player.y=Math.max(player.r,Math.min(PH-player.r,player.y));}}
addEventListener("resize",resize);

// 画像
const IMG={}; function img(n){if(!IMG[n]){const i=new Image();i.src="assets/"+n+".png";IMG[n]=i;}return IMG[n];}
function ready(i){return i&&i.complete&&i.naturalWidth>0;}
["ship","enemy_a","enemy_b","enemy_c","boss","power"].forEach(img);
function sprite(name,x,y,r,fallback){const i=img(name);
  if(ready(i)){const ar=i.naturalWidth/i.naturalHeight;let w=r*2,h=r*2; if(ar>1)h=w/ar; else w=h*ar; ctx.drawImage(i,x-w/2,y-h/2,w,h);}
  else fallback();}

// ── じょうたい ──
let player=null, pb=[], en=[], eb=[], pow=[], pt=[], boss=null, stars=[];
let score=0, hi=0, lives=3, wave=1, state="play", shotT=0, spawnT=0, bossT=0, started=false;
try{hi=parseInt(localStorage.getItem("shooterHi")||"0",10)||0;}catch(e){}

function reset(){
  player={x:PW/2,y:PH*0.8,r:U*0.04,lv:1,inv:0};
  pb=[];en=[];eb=[];pow=[];pt=[];boss=null;
  score=0;lives=3;wave=1;state="play";shotT=0;spawnT=0.6;bossT=26;
  document.getElementById("ov").classList.remove("show");
}
function initStars(){stars=[];for(let i=0;i<70;i++)stars.push({x:Math.random()*PW,y:Math.random()*PH,v:(0.15+Math.random()*0.6),s:Math.random()<0.2?2:1});}

// ── にゅうりょく ──
let dragging=false;
function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*S,y:(t.clientY-r.top)*S};}
function setTarget(p){ if(!player)return; player.x=Math.max(player.r,Math.min(PW-player.r,p.x)); player.y=Math.max(player.r,Math.min(PH-player.r, p.y-U*0.08)); }
cv.addEventListener("pointerdown",e=>{started=true;dragging=true;if(state==="play")setTarget(pos(e));try{cv.setPointerCapture(e.pointerId);}catch(_){}});
cv.addEventListener("pointermove",e=>{if(dragging&&state==="play")setTarget(pos(e));});
addEventListener("pointerup",()=>{dragging=false;});

// ── スポーン ──
const ETYPE={a:{img:"enemy_a",hp:1,sc:100,r:0.035},b:{img:"enemy_b",hp:1,sc:120,r:0.035},c:{img:"enemy_c",hp:2,sc:200,r:0.04}};
function spawnEnemy(){
  const k=Math.random()<0.4?"c":(Math.random()<0.5?"a":"b"); const d=ETYPE[k];
  const x=U*0.08+Math.random()*(PW-U*0.16);
  const e={k,x,y:-U*0.06,r:U*d.r,hp:d.hp+Math.floor(wave/3),sc:d.sc,t:Math.random()*6,baseX:x,vy:PH*(0.16+Math.random()*0.07)+wave*4,shootT:0.8+Math.random()};
  if(k==="b")e.amp=U*0.10+Math.random()*U*0.08;
  en.push(e);
}
function spawnBoss(){
  boss={x:PW/2,y:-U*0.2,ty:PH*0.2,r:U*0.13,hp:55+wave*35,max:55+wave*35,t:0,shootT:1.5,dir:Math.random()<0.5?1:-1,enter:true};
  sBoss();
}

// ── ショット ──
function fire(){
  const y=player.y-player.r, sp=PH*1.25;
  if(player.lv<=1){ pb.push({x:player.x,y,vx:0,vy:-sp,r:U*0.012}); }
  else if(player.lv===2){ pb.push({x:player.x-U*0.025,y,vx:0,vy:-sp,r:U*0.012}); pb.push({x:player.x+U*0.025,y,vx:0,vy:-sp,r:U*0.012}); }
  else { pb.push({x:player.x,y,vx:0,vy:-sp,r:U*0.012}); pb.push({x:player.x,y,vx:-sp*0.34,vy:-sp*0.95,r:U*0.011}); pb.push({x:player.x,y,vx:sp*0.34,vy:-sp*0.95,r:U*0.011}); }
  sShot();
}

function boom(x,y,col,n){ for(let i=0;i<(n||12);i++){const a=Math.random()*6.28,s=U*(0.3+Math.random()*1.1);pt.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:0,life:0.4+Math.random()*0.4,r:U*(0.006+Math.random()*0.012),c:col});} }

function hit(a,b){const dx=a.x-b.x,dy=a.y-b.y,rr=a.r+b.r;return dx*dx+dy*dy<rr*rr;}

function playerHit(){
  if(player.inv>0)return;
  lives--; player.inv=1.6; player.lv=Math.max(1,player.lv-1); sHit(); boom(player.x,player.y,"#5fd0ff",18);
  if(lives<=0) gameOver();
}
function gameOver(){ state="over"; sOver(); if(score>hi){hi=score;try{localStorage.setItem("shooterHi",hi);}catch(e){}}
  document.getElementById("ovS").textContent="SCORE "+score+"　／　HI "+hi;
  document.getElementById("ov").classList.add("show"); }
document.getElementById("ovB").addEventListener("click",()=>{tone(660,0.08);reset();});

// ── こうしん ──
function update(dt){
  for(const s of stars){s.y+=s.v*U*dt*0.6;if(s.y>PH){s.y=0;s.x=Math.random()*PW;}}
  for(const p of pt){p.t+=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;}
  pt=pt.filter(p=>p.t<p.life);
  if(state!=="play")return;
  if(player.inv>0)player.inv-=dt;
  // オートファイア
  shotT-=dt; if(shotT<=0){fire();shotT=0.15;}
  // スポーン（ボス中はしない）
  if(!boss){ bossT-=dt;
    spawnT-=dt; if(spawnT<=0){spawnEnemy(); spawnT=Math.max(0.42,0.95-wave*0.05);}
    if(bossT<=0) spawnBoss();
  }
  // 自弾
  for(const b of pb){b.x+=b.vx*dt;b.y+=b.vy*dt;} pb=pb.filter(b=>b.y>-U*0.1&&b.x>-U&&b.x<PW+U);
  // 敵
  for(const e of en){ e.t+=dt; e.y+=e.vy*dt;
    if(e.k==="b") e.x=e.baseX+Math.sin(e.t*2.2)*e.amp;
    if(e.k==="c"){ e.shootT-=dt; if(e.shootT<=0 && e.y>0 && e.y<PH*0.7){ const a=Math.atan2(player.y-e.y,player.x-e.x); const sp=PH*0.5; eb.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:U*0.013}); e.shootT=1.3; tone(300,0.05,"square",0.05);} }
  }
  en=en.filter(e=>e.y<PH+U*0.1);
  // 敵弾
  for(const b of eb){b.x+=b.vx*dt;b.y+=b.vy*dt;} eb=eb.filter(b=>b.y<PH+U*0.1&&b.y>-U*0.1&&b.x>-U*0.1&&b.x<PW+U*0.1);
  // パワー
  for(const p of pow){p.y+=PH*0.28*dt;} pow=pow.filter(p=>p.y<PH+U*0.1);
  // ボス
  if(boss){ boss.t+=dt;
    if(boss.enter){ boss.y+=PH*0.25*dt; if(boss.y>=boss.ty){boss.y=boss.ty;boss.enter=false;} }
    else { boss.x+=boss.dir*PH*0.16*dt; if(boss.x<boss.r){boss.x=boss.r;boss.dir=1;} if(boss.x>PW-boss.r){boss.x=PW-boss.r;boss.dir=-1;}
      boss.shootT-=dt; if(boss.shootT<=0){ const n=5; const base=Math.atan2(1,0); for(let i=0;i<n;i++){const a=base+(i-(n-1)/2)*0.32; const sp=PH*0.42; eb.push({x:boss.x,y:boss.y+boss.r*0.6,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:U*0.014});} boss.shootT=1.4; tone(220,0.08,"sawtooth",0.07);} }
  }
  // ── あたり ──
  // 自弾 × 敵/ボス
  for(let i=pb.length-1;i>=0;i--){const b=pb[i];let used=false;
    for(let j=en.length-1;j>=0;j--){const e=en[j]; if(hit(b,e)){ e.hp--; used=true; boom(b.x,b.y,"#ffd86b",4);
      if(e.hp<=0){ score+=e.sc; boom(e.x,e.y,"#ff8a3c",12); sBoom(); en.splice(j,1); if(Math.random()<0.08)pow.push({x:e.x,y:e.y,r:U*0.028}); } break; } }
    if(!used && boss && hit(b,boss)){ boss.hp--; used=true; boom(b.x,b.y,"#ffd86b",4);
      if(boss.hp<=0){ score+=3000+wave*500; boom(boss.x,boss.y,"#ff5a4d",40); boom(boss.x,boss.y,"#ffd86b",30); sBoom(); boss=null; wave++; bossT=24; } }
    if(used)pb.splice(i,1);
  }
  // 自機 × 敵弾/敵/ボス/パワー
  if(player.inv<=0){
    for(let i=eb.length-1;i>=0;i--){ if(hit(player,eb[i])){ eb.splice(i,1); playerHit(); break; } }
  }
  if(player.inv<=0){
    for(let j=en.length-1;j>=0;j--){ if(hit(player,en[j])){ boom(en[j].x,en[j].y,"#ff8a3c",10); en.splice(j,1); playerHit(); break; } }
    if(boss && state==="play" && hit(player,boss)) playerHit();
  }
  for(let i=pow.length-1;i>=0;i--){ if(hit(player,pow[i])){ pow.splice(i,1); player.lv=Math.min(3,player.lv+1); score+=50; sPow(); boom(player.x,player.y,"#7dff9a",10); } }
}

// ── えがく ──
function heart(cx,cy,s,col){ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx-s/2,cy,s/2,Math.PI,0);ctx.arc(cx+s/2,cy,s/2,Math.PI,0);ctx.lineTo(cx,cy+s*1.1);ctx.closePath();ctx.fill();}
function draw(){
  ctx.clearRect(0,0,PW,PH);
  ctx.fillStyle="#05070f";ctx.fillRect(0,0,PW,PH);
  // 星
  for(const s of stars){ctx.fillStyle=s.s>1?"#cfe0ff":"#5a6a96";ctx.fillRect(s.x,s.y,s.s,s.s*2);}
  // パワー
  for(const p of pow){ sprite("power",p.x,p.y,p.r,()=>{ctx.fillStyle="#7dff9a";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();ctx.fillStyle="#06301a";ctx.font=`900 ${p.r*1.4}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("P",p.x,p.y);}); }
  // 自弾
  ctx.fillStyle="#9fe8ff"; for(const b of pb){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();}
  // 敵
  for(const e of en){ sprite(ETYPE[e.k].img,e.x,e.y,e.r,()=>{ctx.fillStyle=e.k==="a"?"#ff6b6b":e.k==="b"?"#c98bff":"#ffa23c";ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,7);ctx.fill();}); }
  // 敵弾
  ctx.fillStyle="#ff7a7a"; for(const b of eb){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();}
  // ボス
  if(boss){ sprite("boss",boss.x,boss.y,boss.r,()=>{ctx.fillStyle="#d24a6a";ctx.beginPath();ctx.arc(boss.x,boss.y,boss.r,0,7);ctx.fill();});
    const bw=PW*0.7,bx=(PW-bw)/2,by=U*0.02; ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(bx,by,bw,U*0.018);
    ctx.fillStyle="#ff5a6e";ctx.fillRect(bx,by,bw*Math.max(0,boss.hp/boss.max),U*0.018); }
  // 自機（無敵中は点滅）
  if(state==="play" && !(player.inv>0 && Math.floor(player.inv*16)%2)){
    sprite("ship",player.x,player.y,player.r*1.15,()=>{ctx.fillStyle="#5fd0ff";ctx.beginPath();ctx.moveTo(player.x,player.y-player.r);ctx.lineTo(player.x-player.r*0.85,player.y+player.r*0.8);ctx.lineTo(player.x+player.r*0.85,player.y+player.r*0.8);ctx.closePath();ctx.fill();});
  }
  // パーティクル
  for(const p of pt){ctx.globalAlpha=Math.max(0,1-p.t/p.life);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}
  ctx.globalAlpha=1;
  // HUD
  ctx.fillStyle="#cfe0ff";ctx.font=`900 ${U*0.045}px sans-serif`;ctx.textAlign="left";ctx.textBaseline="top";
  ctx.fillText("SCORE "+score, U*0.03, U*0.03);
  ctx.textAlign="center"; ctx.fillStyle="#8fa6d6"; ctx.font=`900 ${U*0.035}px sans-serif`; ctx.fillText("WAVE "+wave, PW/2, U*0.035);
  for(let i=0;i<lives;i++) heart(PW-U*0.04-i*U*0.06, U*0.05, U*0.022, "#ff5a6e");
  // スタート ヒント
  if(!started){ ctx.fillStyle="rgba(207,224,255,.85)";ctx.font=`900 ${U*0.05}px sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("ドラッグで うごかそう！", PW/2, PH*0.6); }
}
let last=0;
function loop(t){if(!last)last=t;let dt=(t-last)/1000;last=t;if(dt>0.05)dt=0.05; update(dt); draw(); requestAnimationFrame(loop);}
addEventListener("contextmenu",e=>e.preventDefault());
resize(); initStars(); reset(); requestAnimationFrame(loop);
</script>
</body>
</html>
