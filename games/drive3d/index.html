<style>
  :root{ --ink:#5b4636; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; user-select:none; -webkit-user-select:none;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%,#fff7d6,#ffe1b8);
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    height:100dvh;overflow:hidden;touch-action:none;
  }
  #home{position:fixed;left:12px;top:10px;z-index:70;width:46px;height:46px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;background:#fffdf5;box-shadow:0 4px 0 #e8c98a;}
  #home:active{transform:translateY(3px);box-shadow:0 1px 0 #e8c98a;}
  header{width:100%;max-width:760px;text-align:center;padding:8px 14px 0;}
  .title{font-size:21px;font-weight:900;letter-spacing:1px;}
  #hud{font-size:18px;font-weight:900;color:#e07b00;margin-top:2px;}
  #hud span{margin:0 8px;}
  #stage{flex:1;width:100%;display:flex;align-items:center;justify-content:center;padding:8px 10px 12px;min-height:0;}
  #pad{min-width:0;min-height:0;width:100%;height:100%;max-width:760px;border-radius:18px;touch-action:none;
    box-shadow:0 8px 0 #e8c98a, 0 14px 24px rgba(0,0,0,.12);display:block;background:#bfe9ff;}
  .ov{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(91,70,54,.72);z-index:95;padding:20px;}
  .ov.show{display:flex;}
  .ov .big{font-size:60px;}
  .ov .msg{color:#fff;font-weight:900;font-size:20px;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.45);line-height:1.5;}
  .ov button{border:none;font-family:inherit;font-weight:900;font-size:23px;color:#fff;
    background:linear-gradient(180deg,#7bdc8a,#34c759);border-radius:999px;padding:14px 38px;box-shadow:0 5px 0 #1f9e44;cursor:pointer;}
  .ov button:active{transform:translateY(3px);box-shadow:0 2px 0 #1f9e44;}
  @media (orientation:landscape) and (max-height:480px){ header{padding:4px 14px 0;} .title{font-size:18px;} #hud{font-size:15px;} }
</style>

<body>
  <a id="home" href="../../index.html" title="メニューへ">🏠</a>
  <header>
    <div class="title">🚗 3Dドライブ</div>
    <div id="hud"><span>🪙 <b id="coins">0</b></span><span>きょり <b id="dist">0</b>m</span></div>
  </header>

  <div id="stage"><canvas id="pad"></canvas></div>

  <div id="start" class="ov show">
    <div class="big">🚗</div>
    <div class="msg">ゆびで くるまを 左右に うごかして<br>🪙コインを あつめ コーンを よけよう！</div>
    <button id="startBtn">▶ スタート</button>
  </div>
  <div id="over" class="ov">
    <div class="big">🚗💥</div>
    <div class="msg" id="overMsg"></div>
    <button id="retryBtn">もういちど</button>
  </div>

<script type="module">
/* =========================================================
   3Dドライブ（three.js・自前ホスト／CDN不使用）
   - ゆびで くるまを 左右に うごかす。コインを あつめ、コーンを よける
   - だんだん はやくなる。コーンに あたったら おわり
   - three.js は ../../shared/three/（MIT・同梱）。おとは Web Audio
   ========================================================= */
import * as THREE from "../../shared/three/three.module.min.js";

const canvas=document.getElementById("pad");
const ROADX=3.0, CARX=2.55;        // どうろはば／くるまの いどうげんかい
let renderer, scene, camera, car, clock;
let coins=[], cones=[], dashes=[];
let targetX=0, speed=0, dist=0, coinN=0, running=false, best=0;
let spawnT=0;

// ── おと ──
let actx=null;
function beep(f,d=0.07,t="sine",v=0.13){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.stop(actx.currentTime+d);}catch(e){}}
function coinSnd(){ beep(880,0.06,"triangle",0.16); beep(1320,0.06,"triangle",0.1); }
function crashSnd(){ beep(150,0.3,"sawtooth",0.18); }
function fanfare(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.16,"triangle",0.2),i*90)); }

// ── シーン ──
function initScene(){
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xbfe9ff);
  scene.fog=new THREE.Fog(0xbfe9ff, 26, 62);
  camera=new THREE.PerspectiveCamera(60, 1, 0.1, 200);
  camera.position.set(0,5,8.5); camera.lookAt(0,0.6,-12);
  // ライト
  scene.add(new THREE.HemisphereLight(0xffffff, 0x88aa66, 1.0));
  const dir=new THREE.DirectionalLight(0xffffff, 1.0); dir.position.set(6,12,6); scene.add(dir);
  // しばふ
  const grass=new THREE.Mesh(new THREE.PlaneGeometry(80,400), new THREE.MeshLambertMaterial({color:0x8fd36a}));
  grass.rotation.x=-Math.PI/2; grass.position.z=-150; scene.add(grass);
  // どうろ
  const road=new THREE.Mesh(new THREE.PlaneGeometry(ROADX*2+0.6,400), new THREE.MeshLambertMaterial({color:0x6b6f76}));
  road.rotation.x=-Math.PI/2; road.position.set(0,0.01,-150); scene.add(road);
  // どうろの ふち（しろ）
  for(const sx of [-(ROADX+0.2),(ROADX+0.2)]){
    const e=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.12,400), new THREE.MeshLambertMaterial({color:0xffffff}));
    e.position.set(sx,0.06,-150); scene.add(e);
  }
  // まんなかの はくせん（スクロール）
  const dmat=new THREE.MeshLambertMaterial({color:0xffe27a});
  for(let i=0;i<16;i++){ const d=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.06,2.2), dmat); d.position.set(0,0.05,-i*6); scene.add(d); dashes.push(d); }
  // くるま
  car=buildCar(); scene.add(car);
  clock=new THREE.Clock();
}
function buildCar(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.55,2.6), new THREE.MeshLambertMaterial({color:0xff5a5f}));
  body.position.y=0.55; g.add(body);
  const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.15,0.5,1.2), new THREE.MeshLambertMaterial({color:0xfff1f1}));
  cabin.position.set(0,1.0,-0.1); g.add(cabin);
  const wheelG=new THREE.CylinderGeometry(0.34,0.34,0.32,18); const wheelM=new THREE.MeshLambertMaterial({color:0x2b241d});
  for(const [x,z] of [[-0.78,0.85],[0.78,0.85],[-0.78,-0.85],[0.78,-0.85]]){
    const w=new THREE.Mesh(wheelG,wheelM); w.rotation.z=Math.PI/2; w.position.set(x,0.34,z); g.add(w);
  }
  // ヘッドライト
  const lm=new THREE.MeshLambertMaterial({color:0xffe27a});
  for(const x of [-0.45,0.45]){ const l=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.2,0.08),lm); l.position.set(x,0.55,-1.32); g.add(l); }
  return g;
}
function makeCoin(){ const m=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.42,0.1,20), new THREE.MeshLambertMaterial({color:0xffcf3f})); m.rotation.x=Math.PI/2; return m; }
function makeCone(){ const m=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.1,18), new THREE.MeshLambertMaterial({color:0xff7a1a})); m.position.y=0.55; return m; }

// ── サイズ ──
function resize(){
  const w=canvas.clientWidth, h=canvas.clientHeight; if(!w||!h) return;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener("resize",resize);
window.addEventListener("orientationchange",()=>setTimeout(resize,200));
if(window.ResizeObserver){ new ResizeObserver(()=>resize()).observe(canvas); }

// ── そうさ（ゆびで 左右）──
function steer(e){ const r=canvas.getBoundingClientRect(); const frac=(e.clientX-r.left)/r.width; targetX=Math.max(-CARX,Math.min(CARX,(frac-0.5)*2*CARX)); }
canvas.addEventListener("pointerdown",(e)=>{ e.preventDefault(); if(actx&&actx.state==="suspended")actx.resume(); steer(e); try{canvas.setPointerCapture(e.pointerId);}catch(_){}});
canvas.addEventListener("pointermove",(e)=>{ if(e.buttons||e.pointerType==="touch"){ e.preventDefault(); steer(e); } });
window.addEventListener("keydown",(e)=>{ if(e.key==="ArrowLeft")targetX=Math.max(-CARX,targetX-0.6); if(e.key==="ArrowRight")targetX=Math.min(CARX,targetX+0.6); });

// ── スポーン ──
function spawnItem(){
  const lane=(Math.random()*2-1)*(ROADX-0.5);
  if(Math.random()<0.7){ const c=makeCoin(); c.position.set(lane,0.9,-60); scene.add(c); coins.push(c); }
  else { const c=makeCone(); c.position.set(lane,0.55,-60); scene.add(c); cones.push(c); }
}

// ── ゲーム ──
function startGame(){
  for(const c of coins) scene.remove(c); for(const c of cones) scene.remove(c);
  coins=[]; cones=[];
  targetX=0; car.position.set(0,0,0); car.rotation.set(0,0,0);
  speed=14; dist=0; coinN=0; spawnT=0; running=true;
  document.getElementById("coins").textContent=0; document.getElementById("dist").textContent=0;
  clock.getDelta();
  animate();
}
function animate(){
  if(!running) return;
  requestAnimationFrame(animate);
  let dt=clock.getDelta(); if(dt>1/20)dt=1/20;
  speed=Math.min(34, speed+1.6*dt);
  dist+=speed*dt; document.getElementById("dist").textContent=Math.floor(dist/3);
  // くるま いどう（なめらか＋かたむき）
  car.position.x += (targetX-car.position.x)*Math.min(1,dt*10);
  car.rotation.z = (targetX-car.position.x)*-0.25;
  car.rotation.y = (targetX-car.position.x)*0.12;
  // はくせん スクロール
  for(const d of dashes){ d.position.z+=speed*dt; if(d.position.z>10) d.position.z-=16*6; }
  // コイン
  for(let i=coins.length-1;i>=0;i--){ const c=coins[i]; c.position.z+=speed*dt; c.rotation.z+=dt*5;
    if(Math.abs(c.position.x-car.position.x)<0.85 && Math.abs(c.position.z)<1.0){ scene.remove(c); coins.splice(i,1); coinN++; document.getElementById("coins").textContent=coinN; coinSnd(); if(coinN%10===0) fanfare(); continue; }
    if(c.position.z>9){ scene.remove(c); coins.splice(i,1); }
  }
  // コーン
  for(let i=cones.length-1;i>=0;i--){ const c=cones[i]; c.position.z+=speed*dt;
    if(Math.abs(c.position.x-car.position.x)<0.82 && Math.abs(c.position.z)<0.95){ crash(); return; }
    if(c.position.z>9){ scene.remove(c); cones.splice(i,1); }
  }
  // スポーン
  spawnT-=dt; if(spawnT<=0){ spawnItem(); spawnT=Math.max(0.35, 0.7 - dist*0.0006); }
  renderer.render(scene,camera);
}
function crash(){
  running=false; crashSnd();
  const m=Math.floor(dist/3); best=Math.max(best,m);
  document.getElementById("overMsg").innerHTML=`${m}m はしった！🚗<br>🪙 ${coinN}こ あつめた<br><span style="font-size:15px">さいこう ${best}m</span>`;
  setTimeout(()=>document.getElementById("over").classList.add("show"),500);
}

// ── ボタン ──
document.getElementById("startBtn").addEventListener("click",()=>{
  if(actx&&actx.state==="suspended")actx.resume();
  document.getElementById("start").classList.remove("show"); beep(660,0.06,"sine",0.12); resize(); startGame();
});
document.getElementById("retryBtn").addEventListener("click",()=>{
  document.getElementById("over").classList.remove("show"); beep(660,0.06,"sine",0.12); startGame();
});

// ── スタート ──
initScene(); resize(); renderer.render(scene,camera);
</script>
</body>
</html>
